<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#e8dec3">
<title>Colony</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Albert+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ede2c6;
  --bg-deep: #ddd0ac;
  --paper: #f7efd8;
  --paper-soft: #f3e9cc;
  --ink: #2b3328;
  --ink-soft: #5e5a48;
  --ink-faint: #8a8068;
  --moss: #5b7048;
  --moss-deep: #3e5232;
  --terracotta: #b3603e;
  --gold: #b88a3c;
  --rose: #c47a6e;
  --border: #c9b88c;
  --border-soft: #d9c9a0;
  --shadow: rgba(70, 50, 20, 0.18);
  --shadow-soft: rgba(70, 50, 20, 0.08);
  --female: #b85d6a;
  --male: #4a6b8a;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  height: 100dvh;
  margin: 0;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Albert Sans', sans-serif;
  font-size: 15px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  overscroll-behavior: none;
}
body { position: relative; }

button { font-family: inherit; color: inherit; cursor: pointer; border: none; background: none; }

/* === PAPER TEXTURE === */
.paper-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 15%, rgba(200,170,110,0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 85%, rgba(180,140,90,0.10) 0%, transparent 50%),
    var(--bg);
}
.paper-bg::before {
  content: ''; position: absolute; inset: 0; opacity: 0.4;
  background-image:
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(120,90,40,0.015) 3px 4px),
    repeating-linear-gradient(90deg, transparent 0 5px, rgba(120,90,40,0.01) 5px 6px);
  pointer-events: none;
}

/* === SETUP SCREEN === */
#setup {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 10;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
}
#setup .container {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 20px calc(env(safe-area-inset-bottom, 0) + 24px);
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.setup-header { text-align: center; }
.setup-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 42px;
  letter-spacing: -0.5px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 4px;
}
.setup-subtitle {
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.setup-blurb {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-style: italic;
  color: var(--ink-soft);
  text-align: center;
  max-width: 320px;
  margin: 0 auto;
  line-height: 1.45;
}

.cat-pair { display: flex; flex-direction: column; gap: 14px; }

.cat-card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 16px 14px;
  position: relative;
  box-shadow: 0 1px 0 var(--border-soft), 0 8px 16px var(--shadow-soft);
}
.cat-card-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.cat-card-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-style: italic;
  display: flex; align-items: center; gap: 8px;
}
.sex-pill {
  font-family: 'Albert Sans', sans-serif;
  font-style: normal;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 100px;
  text-transform: uppercase;
}
.sex-pill.male { background: rgba(74,107,138,0.15); color: var(--male); }
.sex-pill.female { background: rgba(184,93,106,0.15); color: var(--female); }

.cat-preview {
  height: 130px;
  background: var(--paper-soft);
  border: 1px dashed var(--border-soft);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}
.cat-preview canvas { display: block; }

.cat-name-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}
.cat-name-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  font-family: 'Fraunces', serif;
  font-size: 19px;
  font-style: italic;
  color: var(--ink);
  padding: 4px 2px;
  outline: none;
}
.cat-name-input:focus { border-bottom-color: var(--moss); }

.tag-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-bottom: 12px;
  min-height: 22px;
}
.tag {
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 3px 7px;
  background: var(--paper-soft);
  border: 1px solid var(--border-soft);
  border-radius: 100px;
  color: var(--ink-soft);
}

.cat-actions { display: flex; gap: 8px; }
.btn-pill {
  flex: 1;
  padding: 9px 12px;
  background: var(--paper-soft);
  border: 1px solid var(--border-soft);
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  transition: all 0.15s;
}
.btn-pill:active { background: var(--bg-deep); transform: scale(0.98); }
/* ── Appearance picker: tappable segmented pills ── */
.look-row { margin-bottom: 10px; }
.look-label { font-size: 12px; color: var(--ink-faint); margin-bottom: 4px; }
.look-seg { display: flex; flex-wrap: wrap; gap: 5px; }
.look-pill {
  flex: 0 0 auto;
  padding: 5px 11px;
  background: var(--paper-soft);
  border: 1px solid var(--border-soft);
  border-radius: 100px;
  font-size: 12px;
  color: var(--ink-soft);
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.12s;
}
.look-pill:active { transform: scale(0.96); }
.look-pill.active {
  background: var(--moss-deep);
  border-color: var(--moss-deep);
  color: var(--paper);
  font-weight: 600;
}
.eye-dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.25); display: inline-block; }
.look-row.masked { opacity: 0.4; }
.look-row.masked .look-label { font-style: italic; }
.look-pill:disabled { pointer-events: none; }
/* ── Cat presets ── */
.preset-list { margin: 4px 0 8px; display: flex; flex-direction: column; gap: 5px; }
.preset-empty { font-size: 12px; color: var(--ink-faint); font-style: italic; padding: 2px 0; }
.preset-item { display: flex; gap: 6px; align-items: stretch; }
.preset-load { flex: 1; text-align: left; }
.preset-del {
  flex: 0 0 auto; width: 34px; border-radius: 100px;
  background: var(--paper-soft); border: 1px solid var(--border-soft);
  color: var(--rose); font-size: 13px;
}
.preset-del:active { background: var(--bg-deep); }
.btn-pill.primary {
  background: var(--moss-deep);
  border-color: var(--moss-deep);
  color: var(--paper);
}
.btn-pill.primary:active { background: var(--moss); }

.expander {
  margin-top: 12px;
  border-top: 1px solid var(--border-soft);
  padding-top: 12px;
}
.expander-toggle {
  width: 100%; text-align: left;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
}
.expander-toggle::after { content: '+'; font-size: 18px; font-weight: 300; }
.expander.open .expander-toggle::after { content: '−'; }
.expander-body { display: none; margin-top: 10px; }
.expander.open .expander-body { display: block; }

.slider-row { margin-bottom: 10px; }
.slider-label {
  display: flex; justify-content: space-between;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 4px;
}
.slider-label .val { color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.slider-row input[type=range] {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  background: var(--border-soft);
  border-radius: 2px;
  outline: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--moss-deep);
  cursor: pointer;
  border: 2px solid var(--paper);
  box-shadow: 0 1px 2px var(--shadow);
}
.slider-row input[type=range]::-moz-range-thumb {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--moss-deep);
  border: 2px solid var(--paper);
}

.begin-btn {
  width: 100%;
  padding: 16px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: all 0.15s;
  margin-top: 4px;
}
.begin-btn:active { transform: scale(0.98); background: var(--moss-deep); }

.roll-both-btn {
  align-self: center;
  padding: 8px 18px;
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink-soft);
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--paper);
}

/* === GAME === */
#game { position: fixed; inset: 0; display: none; }
#game.active { display: block; }
#arena {
  position: absolute; inset: 0;
  display: block;
  touch-action: none;
}

#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: calc(env(safe-area-inset-top, 0) + 10px) 14px 10px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px;
  background: linear-gradient(180deg, rgba(237,226,198,0.95) 0%, rgba(237,226,198,0.7) 70%, transparent 100%);
  z-index: 5;
  pointer-events: none;
}
#topbar > * { pointer-events: auto; }

.stat-block {
  display: flex; flex-direction: column;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  line-height: 1.1;
}
.stat-block.stat-right { align-items: flex-end; }
.stat-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
  display: block;
}
.stat-block .val {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 26px;
  line-height: 1;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  margin: 2px 0 1px;
  display: block;
}
.stat-sub {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 11px;
  text-transform: lowercase;
  letter-spacing: 0;
  color: var(--moss-deep);
  display: block;
}
.stat-sub.spring { color: var(--moss); }
.stat-sub.summer { color: var(--gold); }
.stat-sub.fall   { color: var(--terracotta); }
.stat-sub.winter { color: var(--male); }
.gen-tag {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 11px;
  text-transform: none;
  letter-spacing: 0;
  color: var(--moss-deep);
  margin-left: 4px;
}

#endRunBtn {
  flex-shrink: 0;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--paper);
  border: 1px solid var(--border);
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow-soft);
}
#endRunBtn:active { background: var(--bg-deep); }

.topbar-right {
  display: flex; align-items: center;
  gap: 10px;
  pointer-events: auto;
}

.season-tag {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 11px;
  text-transform: lowercase;
  letter-spacing: 0;
  color: var(--terracotta);
  margin-left: 4px;
}
.season-tag.summer { color: var(--gold); }
.season-tag.spring { color: var(--moss); }
.season-tag.fall   { color: var(--terracotta); }
.season-tag.winter { color: var(--male); }

#eventBanner {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0) + 72px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 4;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--paper);
  padding: 7px 16px;
  border-radius: 100px;
  box-shadow: 0 4px 12px var(--shadow);
  pointer-events: none;
  /* wrap long event messages instead of clipping them (user: messages cut off) */
  white-space: normal;
  text-align: center;
  max-width: 90vw;
  animation: bannerIn 0.4s ease-out;
}
#eventBanner.harshWinter { background: #4a6b8a; }
#eventBanner.predator    { background: #8b4040; }
#eventBanner.drought     { background: #b88a3c; }
#eventBanner.epidemic    { background: #6b7c4a; }
#eventBanner.plentiful   { background: #5b7048; }
#eventBanner.hidden      { display: none; }
@keyframes bannerIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}

#evoToggle {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0) + 110px);
  right: 12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--paper);
  border: 1px solid var(--border);
  color: var(--moss-deep);
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--shadow-soft);
  z-index: 5;
  font-family: 'Fraunces', serif;
  font-style: italic;
}
#evoToggle:active { background: var(--bg-deep); }
#evoTracker {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0) + 144px);
  right: 12px;
  width: 188px;
  background: rgba(247,239,216,0.94);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--border-soft);
  border-radius: 10px;
  padding: 10px 12px;
  z-index: 5;
  box-shadow: 0 4px 12px var(--shadow-soft);
}
#evoTracker.hidden { display: none; }
.evo-title {
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.evo-row {
  display: grid;
  grid-template-columns: 56px 1fr 28px;
  align-items: center;
  font-size: 11px;
  margin-bottom: 3px;
  gap: 6px;
}
.evo-row .evo-label {
  color: var(--ink-soft);
  font-family: 'Fraunces', serif;
  font-style: italic;
}
.evo-row .evo-bar-wrap {
  position: relative;
  height: 5px;
  background: var(--bg-deep);
  border-radius: 3px;
}
.evo-row .evo-zero {
  position: absolute;
  left: 50%; top: -1px;
  width: 1px; height: 7px;
  background: var(--ink-faint);
  opacity: 0.6;
}
.evo-row .evo-fill {
  position: absolute;
  top: 0; bottom: 0;
  background: var(--moss-deep);
  border-radius: 3px;
}
.evo-row .evo-fill.neg { background: var(--terracotta); }
.evo-row .evo-val {
  font-variant-numeric: tabular-nums;
  color: var(--ink-faint);
  font-size: 10px;
  text-align: right;
}

#confirmModal {
  position: fixed; inset: 0; z-index: 25;
  background: rgba(40,30,15,0.45);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.confirm-panel {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px 22px 18px;
  max-width: 360px; width: 100%;
  box-shadow: 0 12px 36px var(--shadow);
}
.confirm-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 24px;
  margin-bottom: 8px;
  color: var(--ink);
}
.confirm-body {
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 18px;
  line-height: 1.5;
}
.confirm-actions {
  display: flex; gap: 8px;
}
.confirm-actions .btn-pill { flex: 1; }

.speed-controls {
  display: flex; gap: 2px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px;
}
.speed-btn {
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  border-radius: 100px;
  color: var(--ink-faint);
  min-width: 28px;
  transition: all 0.1s;
}
.speed-btn.active {
  background: var(--ink);
  color: var(--paper);
}

#log {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0) + 10px);
  left: 14px;
  right: 14px;
  max-height: 30vh;
  overflow: hidden;
  pointer-events: none;
  z-index: 4;
  display: flex; flex-direction: column-reverse;
  gap: 4px;
}
.log-entry {
  font-size: 12px;
  color: var(--ink-soft);
  background: rgba(247,239,216,0.85);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 6px 10px;
  border-radius: 8px;
  border-left: 2px solid var(--moss);
  max-width: 320px;
  animation: logIn 0.3s ease-out;
  font-style: italic;
  font-family: 'Fraunces', serif;
}
.log-entry.event-birth { border-left-color: var(--gold); }
.log-entry.event-death { border-left-color: var(--rose); }
.log-entry.event-mate { border-left-color: var(--terracotta); }
@keyframes logIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* === INSPECTOR === */
#inspector {
  position: fixed; inset: 0; z-index: 20;
  pointer-events: none;
  display: flex; flex-direction: column;
  justify-content: flex-end;
}
#inspector.open { pointer-events: auto; }
#inspector::before {
  content: ''; position: absolute; inset: 0;
  background: rgba(40,30,15,0.3);
  opacity: 0; transition: opacity 0.2s;
}
#inspector.open::before { opacity: 1; }
.inspector-panel {
  position: relative;
  background: var(--paper);
  border-top-left-radius: 24px; border-top-right-radius: 24px;
  max-height: 85vh;
  overflow-y: auto;
  padding: 22px 20px calc(env(safe-area-inset-bottom, 0) + 30px);
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow: 0 -8px 30px var(--shadow);
}
#inspector.open .inspector-panel { transform: translateY(0); }
.panel-handle {
  width: 40px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 18px;
}
.inspector-head {
  display: flex; align-items: flex-start; gap: 14px;
  margin-bottom: 18px;
}
.inspector-portrait {
  width: 80px; height: 80px;
  background: var(--paper-soft);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.inspector-portrait canvas { display: block; }
.inspector-meta { flex: 1; }
.inspector-name {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 28px;
  line-height: 1.1;
  color: var(--ink);
  background: transparent;
  border: none;
  outline: none;
  border-bottom: 1px dashed transparent;
  padding: 2px 0;
  width: 100%;
}
.inspector-name:focus { border-bottom-color: var(--border); }
.inspector-subline {
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 2px;
  letter-spacing: 0.04em;
}

.section-title {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin: 18px 0 8px;
  font-weight: 600;
}

.aura-info {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px;
  background: var(--paper-soft);
  border-radius: 8px;
}
.aura-swatch {
  flex: 0 0 36px;
  width: 36px; height: 36px;
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(0,0,0,0.08) inset;
  margin-top: 2px;
}
.aura-text { flex: 1; }
.aura-label {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 3px;
}
.aura-desc {
  font-size: 12px;
  color: var(--ink-soft);
  line-height: 1.4;
}

.needs-bars { display: flex; flex-direction: column; gap: 8px; }
