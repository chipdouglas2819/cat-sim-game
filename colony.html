<script type="module">
// ════════════════════════════════════════════════════════════════
//   COLONY — cat genetics & behavior simulator
// ════════════════════════════════════════════════════════════════

// The web layer (this file) is now just setup UI, canvas rendering, the
// inspector/charts, and the tick() that drives sim.step(dt). All sim-affecting
// logic lives in src/sim/. These imports are only what the web layer still
// uses directly; everything else moved into the Simulation.
import {
  SIM_DAY_REAL_SEC, KITTEN_DAYS, ADULT_END, SENIOR_END,
  PREGNANCY_DAYS, FOOD_LIFETIME, NAME_POOL,
} from './src/sim/constants.js';
import { pick, clamp } from './src/sim/util.js';
import { rollGenes, calculatePhenotype, genesToTags } from './src/sim/genetics.js';
import { makeStartingWeather } from './src/sim/events.js';
import { dropFood as _dropFood } from './src/sim/lifecycle.js';
import { Simulation } from './src/sim/simulation.js';

// ─── STATE ────────────────────────────────────────────────────
// The Simulation owns all sim state AND the tick loop (sim.step()). `state` is
// an alias so the remaining web code keeps using state.X unchanged.
const sim = new Simulation();
const state = sim;
// Aliases for the inspector (catById.get) and restart (parentsById.clear).
const catById = sim.catById;
const parentsById = sim.parentsById;

// ─── DRAWING CATS ─────────────────────────────────────────────
// Compute trait-driven color tint for a cat — used to subtly shift body hue
// so the colony's gene composition is visible at a glance.
function computeTraitTint(cat) {
  if (cat.stage === 'kitten') return null;
  // No founder baseline yet (setup-screen preview) → no tint, so the picker
  // shows the cat's TRUE coat and matches how the founder looks in-sim (a founder
  // has zero drift from itself, hence no tint). Prevents picker/sim mismatch.
  if (!state.founderGenes) return null;
  const g = cat.genes;
  // Tint relative to the FOUNDER baseline (fixed, captured at colony start) — not
  // a fixed 0.5 and not the moving colony mean. So: (a) as the colony drifts from
  // its founders the whole field visibly shifts color = you SEE evolution; (b) an
  // individual cat that differs from the founding stock stands out. The reference
  // is stable, so it's not a "moving target."
  const ref = state.founderGenes;
  const r = (k) => (ref[k] != null ? ref[k] : 0.5);
  const traits = [
    { val: g.aggression - r('aggression'),  hex: [195, 70, 40] },   // aggressive → warm red
    { val: g.boldness - r('boldness'),       hex: [205, 130, 50] },  // bold → orange
    { val: g.energy - r('energy'),           hex: [220, 195, 70] },  // energetic → yellow
    { val: g.sociability - r('sociability'), hex: [110, 175, 110] }, // social → green
    { val: g.playfulness - r('playfulness'), hex: [175, 125, 200] },// playful → violet
  ];
  let strongest = null, strongestAbs = 0.06;   // low threshold — show variation + drift
  for (const t of traits) {
    if (Math.abs(t.val) > strongestAbs) { strongestAbs = Math.abs(t.val); strongest = t; }
  }
  if (!strongest) return null;
  // Amount scales with deviation from the founder baseline. Stronger than before
  // so drift is clearly visible.
  const amount = Math.min(0.5, (strongestAbs - 0.04) * 1.6);
  // Below the founder baseline → cool blue tint (timid, aloof, mellow, gentler)
  const tintHex = strongest.val > 0 ? strongest.hex : [85, 125, 165];
  return { rgb: tintHex, amount };
}

// Mix two hex colors. Returns mixed hex.
function mixHex(baseHex, tintRgb, amount) {
  // Parse base hex into rgb
  if (!baseHex || !baseHex.startsWith('#')) return baseHex;
  let r = parseInt(baseHex.slice(1,3), 16);
  let g = parseInt(baseHex.slice(3,5), 16);
  let b = parseInt(baseHex.slice(5,7), 16);
  // Blend toward tint
  r = Math.round(r + (tintRgb[0] - r) * amount);
  g = Math.round(g + (tintRgb[1] - g) * amount);
  b = Math.round(b + (tintRgb[2] - b) * amount);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function drawCat(ctx, cat, x, y, scale=1, dir=0) {
  const ph = cat.phenotype;
  const isKitten = cat.stage === 'kitten';
  const kittenScale = isKitten ? 0.55 + Math.min(0.45, cat.age/KITTEN_DAYS*0.45) : 1;
  // Physical size: kitten growth × permanent gene-driven bodyScale × condition (gauntness)
  const bScale = cat.bodyScale || 1;
  const condition = cat.condition !== undefined ? cat.condition : 1;
  const condShrink = 0.88 + condition * 0.12;     // very gaunt cats are ~12% smaller
  const s = scale * kittenScale * bScale * condShrink;
  // Long hair adds visual width
  const fluff = (ph.longHair ? 1.18 : 1) * (0.95 + condition*0.05);
  // Senior cats dim very slightly (a subtle age cue). Floor raised 0.7→0.88 —
  // 0.7 made every old cat look 30% translucent (and methuselah cats stay senior
  // a long time), which read as a rendering bug.
  const seniorFade = cat.stage === 'senior' ? clamp(1 - (cat.age - SENIOR_END * 0.75) / (cat.lifespan * 0.25), 0.88, 1) : 1;
  // Pregnant belly extra width factor — grows over the 10 days
  const pregBelly = cat.pregnantWith ? (1 + (1 - cat.pregnantWith.daysLeft/PREGNANCY_DAYS) * 0.45) : 1;

  // Aggression glow (drawn first, under everything) — only on combat
  if (cat.fightGlow > 0.01) {
    ctx.save();
    ctx.fillStyle = `rgba(200,60,40,${cat.fightGlow*0.4})`;
    ctx.beginPath();
    ctx.arc(x, y, 22*s*fluff, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Sick aura — pale greenish ring (kept because it's a state, not a trait)
  if (cat.sick) {
    ctx.save();
    ctx.fillStyle = `rgba(140,170,90,0.18)`;
    ctx.beginPath();
    ctx.arc(x, y, 18*s*fluff, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // TRAIT TINT — temporarily shift the phenotype's base color toward a trait color.
  // This is the visible-evolution mechanic: a colony drifting toward boldness becomes warmer-toned.
  const tint = computeTraitTint(cat);
  let origBaseHex = null, origOrangeHex = null;
  if (tint) {
    origBaseHex = ph.baseHex;
    ph.baseHex = mixHex(ph.baseHex, tint.rgb, tint.amount);
    if (ph.orangeHex) {
      origOrangeHex = ph.orangeHex;
      ph.orangeHex = mixHex(ph.orangeHex, tint.rgb, tint.amount * 0.7);
    }
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(dir);
  // Stack opacity: senior fade × sick desaturation alpha
  let alpha = 1;
  if (seniorFade < 1) alpha *= seniorFade;
  if (cat.sick) alpha *= 0.72;
  if (alpha < 1) ctx.globalAlpha = alpha;

  // soft shadow
  ctx.fillStyle = 'rgba(70,50,20,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, 4*s, 16*s*fluff*pregBelly, 5*s*pregBelly, 0, 0, Math.PI*2);
  ctx.fill();

  // tail (drawn first, behind body). Colorpoint cats have a dark point-colored tail.
  const extremityHex = ph.pointed && ph.pointHex ? ph.pointHex : ph.baseHex;
  const tailLen = (ph.longHair?16:13)*s;
  const tailWag = Math.sin(state.simTime*4 + cat.id) * 0.3;
  const tailPath = () => {
    ctx.beginPath();
    ctx.moveTo(-12*s, 0);
    ctx.quadraticCurveTo(-18*s, -3*s + tailWag*5, -14*s -tailLen*0.4, tailWag*8);
    ctx.stroke();
  };
  ctx.lineCap = 'round';
  // Longhair: a soft wide fluff underlay along the tail (matches the body halo),
  // then the solid tail on top — so a plush tail reads instead of a thin line.
  if (ph.longHair && /^#[0-9a-fA-F]{6}$/.test(extremityHex)) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = extremityHex;
    ctx.lineWidth = 10*s;
    tailPath();
    ctx.restore();
  }
  ctx.strokeStyle = extremityHex;
  ctx.lineWidth = (ph.longHair?6:3.5)*s;
  tailPath();

  // body
  drawCoat(ctx, cat, s, fluff, pregBelly);

  // head (front)
  const headR = 7.5*s;
  ctx.save();
  ctx.translate(10*s, 0);

  // ears — colorpoint cats have dark point-colored ears
  ctx.fillStyle = extremityHex;
  ctx.beginPath();
  ctx.moveTo(-3*s, -headR*0.6);
  ctx.lineTo(-5*s, -headR*1.4);
  ctx.lineTo(-1*s, -headR*0.85);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-3*s, headR*0.6);
  ctx.lineTo(-5*s, headR*1.4);
  ctx.lineTo(-1*s, headR*0.85);
  ctx.closePath();
  ctx.fill();

  // head circle
  ctx.fillStyle = ph.baseHex;
  ctx.beginPath();
  ctx.arc(0, 0, headR, 0, Math.PI*2);
  ctx.fill();

  // colorpoint mask — dark muzzle/face point on the front of the head
  if (ph.pointed && ph.pointHex) {
    ctx.fillStyle = ph.pointHex;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.ellipse(headR*0.55, 0, headR*0.5, headR*0.45, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // tortie/calico head patch (clipped to head)
  if (ph.baseColor === 'tortie' || ph.baseColor === 'calico') {
    ctx.save();
    ctx.beginPath();
    ctx.arc(0, 0, headR, 0, Math.PI*2);
    ctx.clip();
    ctx.fillStyle = ph.orangeHex;
    ctx.beginPath();
    ctx.arc(headR*0.3, -headR*0.3, headR*0.55, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // head white marking — driven by the white PATTERN (not a bare amount). A
  // vertical blaze down the face for tuxedo/bicolor/mitted; van gets a mostly
  // white face (ears stay colored). Colorpoint cats keep their muzzle mask.
  if (!ph.pointed) {
    const hwp = ph.whitePattern || 'solid';
    if (hwp === 'van' || ph.whiteAmount >= 0.8) {
      ctx.fillStyle = '#f3ecd5';
      ctx.beginPath();
      ctx.ellipse(headR*0.35, 0, headR*0.8, headR*0.78, 0, 0, Math.PI*2);
      ctx.fill();
    } else if (hwp === 'tuxedo' || hwp === 'bicolor' || hwp === 'mitted') {
      ctx.fillStyle = '#f3ecd5';
      ctx.beginPath();
      ctx.ellipse(headR*0.5, 0, headR*0.30, headR*0.6, 0, 0, Math.PI*2);   // vertical face blaze
      ctx.fill();
    }
  }

  // eyes — the original cute round eye, now COLORED by iris, with a vertical
  // cat-slit pupil. Each eye is an independent fill so heterochromia/albino show.
  const eyeOpen = cat.state === 'sleep' ? 0.15 : 1;
  const eye1 = ph.eyeHex || '#caa64a';
  const eye2 = ph.eyeHex2 || ph.eyeHex || '#caa64a';
  const eyeRx = 1.5 * s, eyeRy = 1.7 * s * eyeOpen;
  const drawEye = (ey, iris, fleck) => {
    // iris (full eye)
    ctx.fillStyle = iris;
    ctx.beginPath();
    ctx.ellipse(headR*0.45, ey, eyeRx, eyeRy, 0, 0, Math.PI*2);
    ctx.fill();
    if (fleck) {   // sectoral heterochromia — half the iris a different tint
      ctx.fillStyle = '#bcdcee';
      ctx.beginPath();
      ctx.ellipse(headR*0.45, ey, eyeRx*0.5, eyeRy, 0, 0, Math.PI*2);
      ctx.fill();
    }
    // slit pupil (cat eye). The cat's local +x is the nose→tail axis, so a real
    // cat's vertical slit projects ALONG that axis from top-down — elongate in x,
    // thin in y (was reversed, which read as a horizontal goat slit).
    if (s > 0.5 && eyeOpen > 0.4) {
      ctx.fillStyle = 'rgba(18,14,10,0.92)';
      ctx.beginPath();
      ctx.ellipse(headR*0.45, ey, eyeRx*0.78, eyeRy*0.30, 0, 0, Math.PI*2);
      ctx.fill();
    }
  };
  drawEye(-headR*0.35, eye1, ph.eyeSectoral);
  drawEye(headR*0.35, eye2, false);

  // tiny nose
  if (s > 0.5) {
    ctx.fillStyle = '#c47080';
    ctx.beginPath();
    ctx.arc(headR*0.95, 0, 0.9*s, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();

  ctx.restore();

  // birth sparkle
  if (cat.bornFlash > 0) {
    ctx.fillStyle = `rgba(212, 168, 90, ${cat.bornFlash})`;
    for (let i=0;i<5;i++) {
      const a = (i/5)*Math.PI*2 + state.simTime*2;
      const r = 14 + cat.bornFlash*8;
      ctx.beginPath();
      ctx.arc(x + Math.cos(a)*r, y + Math.sin(a)*r, 1.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // state icon
  if (s > 0.6 && cat.state !== 'wander' && cat.state !== 'sleep') {
    const icon = STATE_ICONS[cat.state];
    if (icon) {
      ctx.font = `${14*scale}px serif`;
      ctx.textAlign = 'center';
      ctx.fillText(icon, x, y - 18*scale);
    }
  }
  if (cat.state === 'sleep') {
    ctx.font = `${12*scale}px serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(60,50,30,${0.4 + 0.3*Math.sin(state.simTime*3)})`;
    ctx.fillText('z', x + 14*scale + Math.sin(state.simTime*2)*2, y - 12*scale);
  }

  // pregnant indicator (small dot)
  if (cat.pregnantWith) {
    ctx.fillStyle = 'rgba(180,90,100,0.8)';
    ctx.beginPath();
    ctx.arc(x, y - 14*scale, 2, 0, Math.PI*2);
    ctx.fill();
  }

  // Personality cue — a single transient icon that floats up + fades, showing
  // what the cat is feeling/doing (posture 〰, aloof ·, heart ♥, play ♪, groom ✿,
  // zoomie ⚡, cry !, grief …). Lightweight: one field, no array (the old
  // floatTexts array was the lag source). cueT counts down in sim-weeks.
  if (cat.cue && cat.cueT > 0 && s > 0.55) {
    const cueLife = 1.4;
    const prog = 1 - cat.cueT / cueLife;        // 0 → just set, 1 → expiring
    const a = Math.max(0, Math.min(1, cat.cueT * 1.4));
    ctx.globalAlpha = a;
    ctx.font = `${13*scale}px serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#3a3024';
    ctx.fillText(cat.cue, x, y - 20*scale - prog*10*scale);
    ctx.globalAlpha = 1;
  }
  // Restore original phenotype colors that we temporarily tinted
  if (origBaseHex !== null) ph.baseHex = origBaseHex;
  if (origOrangeHex !== null) ph.orangeHex = origOrangeHex;
}

const STATE_ICONS = {
  eat: '🐟', seek_food: '', mate: '♥', court: '♥',
  flee: '!', fight: '⚡', groom: '✿', play: '♪',
  pregnant: '', social: ''
};

function drawCoat(ctx, cat, s, fluff, pregBelly=1) {
  const ph = cat.phenotype;
  const bodyW = 14 * s * fluff * pregBelly;
  const bodyH = 9 * s * fluff * pregBelly;
  // LOD: skip detailed pattern overlays when there are many cats (cheap rendering pass)
  const simplifyPatterns = state.cats.length > 400;

  // Longhair fluff — a soft fur halo that fades at the edges (no tufts), a small
  // amount larger than the body so it reads as fluff, not a bold ring. Drawn
  // FIRST (behind the body). Radial gradient: coat color near the body → fully
  // transparent at the tips.
  if (ph.longHair) {
    ctx.save();
    const fr = bodyW * 1.18;   // modest halo reach (was 1.32 + extra tufts)
    // transparent version of the coat color — only #rrggbb supports the +'00'
    // alpha suffix; fall back if it's not a 6-hex.
    const furHex = (/^#[0-9a-fA-F]{6}$/.test(ph.baseHex)) ? ph.baseHex : '#999999';
    const grad = ctx.createRadialGradient(0, 0, bodyH * 0.85, 0, 0, fr);
    grad.addColorStop(0, furHex);
    grad.addColorStop(0.6, furHex);
    grad.addColorStop(1, furHex + '00');   // fade to transparent
    ctx.fillStyle = grad;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, fr, bodyH * 1.22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // base body
  ctx.fillStyle = ph.baseHex;
  ctx.beginPath();
  ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI*2);
  ctx.fill();

  // tortie/calico — orange patches (clipped to body to prevent off-body tumors)
  if (ph.baseColor === 'tortie' || ph.baseColor === 'calico') {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI*2);
    ctx.clip();
    ctx.fillStyle = ph.orangeHex;
    // Deterministic patches based on cat id for stability
    const seed = cat.id * 9301 + 49297;
    const r = (n) => { const x = Math.sin(seed + n*12.9898) * 43758.5453; return x - Math.floor(x); };
    const patches = simplifyPatterns ? 2 : 3;
    for (let i=0;i<patches;i++) {
      const px = (r(i*2)-0.5)*bodyW*1.2;
      const py = (r(i*2+1)-0.5)*bodyH*1.0;
      ctx.beginPath();
      ctx.ellipse(px, py, bodyW*0.32, bodyH*0.38, r(i*3)*Math.PI, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  // tabby pattern overlay (skipped in LOD mode)
  if (ph.pattern !== 'solid' && !simplifyPatterns) {
    ctx.save();
    // Clip to body ellipse
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI*2);
    ctx.clip();
    const darker = darken(ph.baseHex, 0.4);
    ctx.fillStyle = darker;
    ctx.strokeStyle = darker;
    ctx.lineCap = 'round';
    if (ph.pattern === 'Mc') {
      // Mackerel — vertical-ish stripes
      ctx.lineWidth = 1.2*s;
      for (let i=-3; i<=3; i++) {
        ctx.beginPath();
        ctx.moveTo(i*bodyW*0.25, -bodyH);
        ctx.quadraticCurveTo(i*bodyW*0.25 + 1, 0, i*bodyW*0.25, bodyH);
        ctx.stroke();
      }
    } else if (ph.pattern === 'Cs') {
      // Classic — swirl
      ctx.lineWidth = 1.5*s;
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW*0.55, bodyH*0.55, 0, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(0, 0, bodyW*0.25, bodyH*0.3, 0, 0, Math.PI*2);
      ctx.stroke();
    } else if (ph.pattern === 'Sp') {
      // Spotted
      const seed2 = cat.id * 7919;
      const r = (n) => { const x = Math.sin(seed2 + n*78.233) * 43758.5453; return x - Math.floor(x); };
      for (let i=0; i<8; i++) {
        const px = (r(i*2)-0.5)*bodyW*1.7;
        const py = (r(i*2+1)-0.5)*bodyH*1.7;
        ctx.beginPath();
        ctx.arc(px, py, 1.3*s, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (ph.pattern === 'Tk') {
      // Ticked — subtle speckle
      const seed3 = cat.id * 6151;
      const r = (n) => { const x = Math.sin(seed3 + n*123.4) * 43758.5453; return x - Math.floor(x); };
      for (let i=0; i<14; i++) {
        const px = (r(i*2)-0.5)*bodyW*1.8;
        const py = (r(i*2+1)-0.5)*bodyH*1.8;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(px, py, 0.6*s, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  // White spotting — NAMED patterns, authored for the TOP-DOWN view. Local frame:
  // +x = FRONT (head/nose), -x = REAR (tail); ±y = the two flanks. From above you
  // see the BACK, so each pattern is distinguished by HOW MUCH of the back — and
  // which END — stays colored. Color = the unpainted body ellipse; white = ink.
  const wp = ph.whitePattern || 'solid';
  if (wp !== 'solid') {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, 0, bodyW, bodyH, 0, 0, Math.PI*2);
    ctx.clip();
    const WHITE = '#f3ecd5';
    ctx.fillStyle = WHITE;
    // small white throat dot at the front midline
    const throat = () => { ctx.beginPath(); ctx.ellipse(bodyW*0.55, 0, bodyW*0.20, bodyH*0.30, 0, 0, Math.PI*2); ctx.fill(); };
    // four white paw caps at the leg corners — visible on the flank silhouette
    const toes = () => {
      for (const px of [bodyW*0.62, -bodyW*0.62]) for (const py of [bodyH*0.66, -bodyH*0.66]) {
        ctx.beginPath(); ctx.ellipse(px, py, bodyW*0.18, bodyH*0.28, 0, 0, Math.PI*2); ctx.fill();
      }
    };
    // white bib up the front-center, never crossing onto the rear/dorsal back
    const bib = () => {
      ctx.beginPath(); ctx.ellipse(bodyW*0.5, 0, bodyW*0.30, bodyH*0.55, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bodyW*0.15, 0, bodyW*0.34, bodyH*0.18, 0, 0, Math.PI*2); ctx.fill();
    };
    if (wp === 'locket') {
      throat();                                  // ~6%: one small chest dot
    } else if (wp === 'mitted') {
      throat(); toes();                          // ~21%: throat + four feet
    } else if (wp === 'tuxedo') {
      bib(); toes();                             // ~32%: white front bib + feet, colored back "jacket"
    } else if (wp === 'bicolor') {
      // ~61% white: whiten front+flanks, leave a COLORED saddle over the rear/back
      ctx.beginPath(); ctx.ellipse(bodyW*0.7, 0, bodyW*1.0, bodyH*1.2, 0, 0, Math.PI*2); ctx.fill();
    } else if (wp === 'van') {
      // ~84% white: nearly all white, just a small COLORED spot at the rump (tail base)
      ctx.beginPath(); ctx.ellipse(0, 0, bodyW*1.3, bodyH*1.3, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = ph.baseHex;
      ctx.beginPath(); ctx.ellipse(-bodyW*0.72, 0, bodyW*0.30, bodyH*0.55, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = WHITE;
    }
    ctx.restore();
  }
}

// darken stays here — it's only used by the render layer.
// lightenHex was moved to ./src/sim/util.js (createCat needs it for smoke trait).
function darken(hex, amt) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const f = 1-amt;
  return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
}

// ─── FOOD & ARENA ─────────────────────────────────────────────
// dropFood wrapper — lives in lifecycle.js
function dropFood(x, y) { _dropFood(sim, x, y); }

function drawFood(ctx, f) {
  const age = state.simTime - f.bornAt;
  const fade = age > FOOD_LIFETIME-10 ? clamp((FOOD_LIFETIME - age)/10, 0, 1) : 1;
  ctx.save();
  ctx.globalAlpha = fade * 0.95;
  ctx.fillStyle = '#9c6a3a';
  ctx.beginPath();
  ctx.arc(f.x, f.y, 5*Math.sqrt(f.amount), 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(60,40,15,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

function drawArena(ctx) {
  // background
  ctx.fillStyle = '#ede2c6';
  ctx.fillRect(0, 0, arenaW, arenaH);
  // subtle noise dots
  ctx.fillStyle = 'rgba(120,90,40,0.04)';
  for (let i=0;i<60;i++) {
    const x = ((i*7919 + 11) % arenaW);
    const y = ((i*7333 + 7) % arenaH);
    ctx.fillRect(x, y, 1, 1);
  }
  // feeding spots — soft worn patches around recurring food sources (now subtler since spread is wider)
  for (const spot of state.feedSpots) {
    const g = ctx.createRadialGradient(spot.x, spot.y, 0, spot.x, spot.y, 70);
    g.addColorStop(0, 'rgba(170,120,70,0.08)');
    g.addColorStop(0.6, 'rgba(170,120,70,0.03)');
    g.addColorStop(1, 'rgba(170,120,70,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(spot.x, spot.y, 70, 0, Math.PI*2);
    ctx.fill();
  }
  // soft inner shadow / vignette
  const grad = ctx.createRadialGradient(arenaW/2, arenaH/2, Math.min(arenaW,arenaH)*0.3,
    arenaW/2, arenaH/2, Math.max(arenaW,arenaH)*0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(70,50,20,0.18)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,arenaW,arenaH);
}

// localDensity, spatial queries, AI (chooseAction/updateCat/executeState/
// moveToward), mating, birth, environmental pressure, and seasonal events all
// live in src/sim/ and run inside sim.step(). The web layer triggers exactly
// one sim action directly — the lone-survivor death in the end-check — via
// sim.kill().

function drawDying(ctx, cat) {
  const t = cat.dyingT;
  // Phase 1 (0-1s): fade body to skull
  // Phase 2 (1-2.5s): skull
  // Phase 3 (2.5-3.5s): skull fades
  if (t < 1) {
    const opacity = 1 - t*0.6;
    ctx.globalAlpha = opacity;
    drawCat(ctx, cat, cat.x, cat.y - t*4, 1, cat.dir);
    ctx.globalAlpha = 1;
  } else if (t < 2.5) {
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(40,30,20, ${Math.min(1, (t-1)*2)})`;
    ctx.fillText('💀', cat.x, cat.y - 4 - (t-1)*2);
  } else {
    const a = clamp(1 - (t-2.5), 0, 1);
    ctx.globalAlpha = a;
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2a2418';
    ctx.fillText('💀', cat.x, cat.y - 7 - (t-2.5)*6);
    ctx.globalAlpha = 1;
  }
}

// ─── EVENTS / LOG ─────────────────────────────────────────────
// Event filtering + sim.events live in Simulation.logEvent. The web layer only
// renders the log (re-rendered each frame from tick()); it logs via sim.logEvent.
function renderLog() {
  const wrap = document.getElementById('log');
  wrap.innerHTML = '';
  const recent = state.events.slice(0, 4);
  for (const e of recent) {
    const div = document.createElement('div');
    div.className = `log-entry event-${e.type}`;
    div.textContent = e.text;
    wrap.appendChild(div);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────
// The sim half of the tick lives in Simulation.step(dt) (src/sim/simulation.js).
// This function only does web work: compute real-time dt, drive the sim, then
// render + update DOM. The bench harness drives the same sim.step() with a
// fixed dt and no DOM.
function tick(time) {
  if (state.phase === 'running') {
    if (!state.lastTime) state.lastTime = time;
    const realDt = Math.min((time - state.lastTime) / 1000, 1/15);
    state.lastTime = time;
    const dt = realDt / SIM_DAY_REAL_SEC * state.speed;

    // Advance the simulation (pure — no DOM)
    const { sampledHistory } = sim.step(dt);

    // Refresh the evo tracker when a new history sample landed and it's open
    if (sampledHistory) {
      const tr = document.getElementById('evoTracker');
      if (tr && !tr.classList.contains('hidden')) renderEvoTracker();
    }

    // End detection. The sim's biological end is livingCount <= 1; the web layer
    // adds an animation grace period so dying fades finish on screen.
    const livingCount = sim.livingCount();
    if (livingCount <= 1) {
      state._endTimer = (state._endTimer || 0) + dt * SIM_DAY_REAL_SEC / state.speed; // real seconds
      const allDead = livingCount === 0 && state.cats.length === 0;
      const loneSurvivor = livingCount === 1 && state.cats.length === 1;
      if (allDead) endSimulation();
      else if (loneSurvivor && state._endTimer > 3) {
        const lone = state.cats.find(c => !c.dying);
        if (lone) {
          sim.logEvent(`${lone.name} is the last cat. The line ends.`, 'death');
          sim.kill(lone, 'alone');
        }
      }
    } else if (state._endTimer) {
      state._endTimer = 0;
    }

    // Log + UI
    renderLog();
    document.getElementById('dayCount').textContent = Math.floor(state.simTime);
    document.getElementById('popCount').textContent = livingCount;
    const weekSub = document.getElementById('weekSub');
    weekSub.textContent = `${state.season} · Y${state.year}`;
    weekSub.className = 'stat-sub ' + state.season;
    document.getElementById('catSub').textContent = 'Gen ' + state.generation;
    const banner = document.getElementById('eventBanner');
    if (state.activeEvent) {
      banner.textContent = state.activeEventMessage;
      banner.className = state.activeEvent;
    } else {
      banner.className = 'hidden';
    }
  } else {
    state.lastTime = time;
  }

  // Render
  if (state.phase !== 'setup') render();

  requestAnimationFrame(tick);
}

function render() {
  const ctx = canvas.getContext('2d');
  drawArena(ctx);
  // Food first
  for (const f of state.food) drawFood(ctx, f);
  // Cats sorted by y for fake depth
  const sorted = [...state.cats].sort((a,b)=>a.y-b.y);
  for (const cat of sorted) {
    if (cat.dying) drawDying(ctx, cat);
    else drawCat(ctx, cat, cat.x, cat.y, 1, cat.dir);
  }
}

// ─── INPUT ────────────────────────────────────────────────────
function onArenaTap(e) {
  if (state.phase !== 'running') return;
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;
  // Find tapped cat
  let tappedCat = null, bestD = 30;
  for (const c of state.cats) {
    if (c.dying) continue;
    const d = Math.hypot(c.x-x, c.y-y);
    if (d < bestD) { bestD = d; tappedCat = c; }
  }
  if (tappedCat) {
    openInspector(tappedCat);
  } else {
    // Drop food
    dropFood(x, y);
  }
}

// ─── INSPECTOR ────────────────────────────────────────────────
function openInspector(cat) {
  state.selectedCatId = cat.id;
  const panel = document.getElementById('inspectorPanel');
  panel.innerHTML = '';
  const handle = document.createElement('div');
  handle.className = 'panel-handle';
  panel.appendChild(handle);

  // Head
  const head = document.createElement('div');
  head.className = 'inspector-head';
  const portrait = document.createElement('div');
  portrait.className = 'inspector-portrait';
  const pc = document.createElement('canvas');
  pc.width = 80; pc.height = 80;
  portrait.appendChild(pc);
  setTimeout(()=>{
    const pctx = pc.getContext('2d');
    pctx.clearRect(0,0,80,80);
    drawCat(pctx, cat, 40, 45, 1.6, 0);
  },0);
  head.appendChild(portrait);
  const meta = document.createElement('div');
  meta.className = 'inspector-meta';
  const nameI = document.createElement('input');
  nameI.className = 'inspector-name';
  nameI.value = cat.name;
  nameI.maxLength = 16;
  nameI.addEventListener('input', () => { cat.name = nameI.value || cat.name; });
  meta.appendChild(nameI);
  const sub = document.createElement('div');
  sub.className = 'inspector-subline';
  let sublineExtra = '';
  if (cat.sex === 'F' && cat.stage !== 'kitten' && !cat.pregnantWith) {
    sublineExtra = cat.inEstrus ? ' · in heat' : ' · not in heat';
  }
  const gen = cat._gen || 1;
  const sizePct = Math.round((cat.bodyScale || 1) * 100);
  const sizeWord = cat.bodyScale < 0.7 ? 'small' : cat.bodyScale > 1.3 ? 'large' : 'average';
  // "build" = realized body size (phenotype, ~45-160%). Distinct from the
  // heritable "Size gene" bar in Disposition below (genotype, 0-100%).
  sub.textContent = `${cat.sex==='M'?'♂':'♀'} · G${gen} · ${cat.stage} · ${cat.age.toFixed(0)}w · ${sizeWord} build ${sizePct}% · ${cat.phenotype.description}${sublineExtra}`;
  meta.appendChild(sub);
  // Special trait badges
  if (cat.rareTraits && cat.rareTraits.length) {
    const badges = document.createElement('div');
    badges.className = 'rare-badges';
    for (const t of cat.rareTraits) {
      const span = document.createElement('span');
      span.className = 'rare-badge';
      span.textContent = t;
      badges.appendChild(span);
    }
    meta.appendChild(badges);
  }
  head.appendChild(meta);
  panel.appendChild(head);

  // Needs
  panel.appendChild(sectionTitle('Needs'));
  const needs = document.createElement('div');
  needs.className = 'needs-bars';
  needs.appendChild(needBar('Hunger', cat.hunger));
  needs.appendChild(needBar('Energy', cat.energy));
  needs.appendChild(needBar('Social', cat.social));
  needs.appendChild(needBar('Condition', cat.condition !== undefined ? cat.condition : 1));
  panel.appendChild(needs);

  // Genes
  panel.appendChild(sectionTitle('Visible genes'));
  const vg = document.createElement('div');
  vg.className = 'gene-grid';
  const visibles = [
    ['B (black)', cat.genes.B.join('')],
    ['D (dense)', cat.genes.D.join('')],
    ['A (agouti)', cat.genes.A.join('')],
    ['T (tabby)', cat.genes.T.join('/')],
    ['S (white)', cat.genes.S.join('')],
    ['L (hair)', cat.genes.L.join('')],
    ['W (white)', cat.genes.W.join('')],
    ['O (orange)', cat.genes.O.join('') + (cat.sex==='M'?'/Y':'')],
  ];
  for (const [k,v] of visibles) {
    const row = document.createElement('div');
    row.className = 'gene-row';
    row.innerHTML = `<span class="gene-name">${k}</span><span class="gene-val">${v}</span>`;
    vg.appendChild(row);
  }
  panel.appendChild(vg);

  // Behavior
  panel.appendChild(sectionTitle('Disposition'));
  const bg = document.createElement('div');
  bg.className = 'needs-bars';
  bg.appendChild(needBar('Bold', cat.genes.boldness, true));
  bg.appendChild(needBar('Social', cat.genes.sociability, true));
  bg.appendChild(needBar('Playful', cat.genes.playfulness, true));
  bg.appendChild(needBar('Aggro', cat.genes.aggression, true));
  bg.appendChild(needBar('Energy', cat.genes.energy, true));
  bg.appendChild(needBar('Appetite', cat.genes.appetite, true));
  // The heritable size gene (genotype) — what offspring inherit. Differs from
  // the realized "build %" in the header, which adds appetite/energy/noise.
  if (cat.genes.size !== undefined) bg.appendChild(needBar('Size gene', cat.genes.size, true));
  panel.appendChild(bg);

  // Coat tint — explains what trait color (if any) shifts this cat's coat in the arena
  panel.appendChild(sectionTitle('Coat tint'));
  const auraInfo = computeAuraInfo(cat);
  const auraDiv = document.createElement('div');
  auraDiv.className = 'aura-info';
  if (auraInfo.label) {
    auraDiv.innerHTML = `<span class="aura-swatch" style="background:${auraInfo.color}"></span>
      <div class="aura-text"><div class="aura-label">${auraInfo.label}</div>
      <div class="aura-desc">${auraInfo.desc}</div></div>`;
  } else {
    auraDiv.innerHTML = `<div class="aura-text"><div class="aura-desc" style="font-style:italic;color:var(--ink-faint)">No notable tint — traits near population baseline.</div></div>`;
  }
  panel.appendChild(auraDiv);

  // Relations
  panel.appendChild(sectionTitle('Family'));
  panel.appendChild(buildPedigree(cat));
  if (cat.pregnantWith) {
    const preg = document.createElement('div');
    preg.className = 'pedigree-note';
    preg.textContent = `Pregnant · ${cat.pregnantWith.daysLeft.toFixed(0)} weeks left`;
    panel.appendChild(preg);
  }

  if (cat.inbreedF > 0.02) {
    const coef = document.createElement('div');
    coef.className = 'coefficient-display';
    coef.innerHTML = `Inbreeding coefficient <strong>F = ${cat.inbreedF.toFixed(3)}</strong> — affects lifespan and kitten viability`;
    panel.appendChild(coef);
  }

  document.getElementById('inspector').classList.add('open');
}

// Helper: find a cat by id (alive or deceased)
function findCatById(id) {
  if (id == null) return null;
  const alive = catById.get(id);
  if (alive) return { record: alive, alive: true };
  const dead = state.deceased.find(d => d.id === id);
  if (dead) return { record: dead, alive: false };
  return null;
}

// Build a small portrait card for one ancestor/descendant in the pedigree
function pedigreeCard(catId, role) {
  const found = findCatById(catId);
  const card = document.createElement('div');
  card.className = 'pedigree-card' + (found ? '' : ' missing') + (found && !found.alive ? ' deceased' : '');
  if (!found) {
    card.innerHTML = `<div class="ped-portrait"></div><div class="ped-name">unknown</div><div class="ped-role">${role}</div>`;
    return card;
  }
  const c = found.record;
  // Tiny canvas portrait
  const portraitWrap = document.createElement('div');
  portraitWrap.className = 'ped-portrait';
  const pc = document.createElement('canvas');
  pc.width = 48; pc.height = 48;
  portraitWrap.appendChild(pc);
  card.appendChild(portraitWrap);
  // Render the cat at small scale
  setTimeout(() => {
    const ctx = pc.getContext('2d');
    ctx.clearRect(0,0,48,48);
    // For deceased records we don't have x/y/state — use an adult template
    const renderCat = found.alive ? c : {
      ...c, x: 24, y: 24, vx: 0, vy: 0, dir: 0, state: 'wander',
      stage: c.age < KITTEN_DAYS ? 'kitten' : c.age < ADULT_END ? 'adult' : 'senior',
      floatTexts: [], bornFlash: 0, fightGlow: 0, sick: false,
      condition: 1, hunger: 0.8, energy: 0.8,
      pregnantWith: null,
    };
    drawCat(ctx, renderCat, 24, 28, 1, 0);
  }, 0);
  const nameDiv = document.createElement('div');
  nameDiv.className = 'ped-name';
  nameDiv.textContent = c.name;
  card.appendChild(nameDiv);
  const roleDiv = document.createElement('div');
  roleDiv.className = 'ped-role';
  roleDiv.textContent = role + (found.alive ? '' : ' †');
  card.appendChild(roleDiv);
  // Make alive cats tappable to inspect them
  if (found.alive) {
    card.classList.add('tappable');
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      openInspector(c);
    });
  }
  return card;
}

function buildPedigree(cat) {
  const wrap = document.createElement('div');
  wrap.className = 'pedigree';

  // Parents row
  if (cat.parents) {
    const parentsRow = document.createElement('div');
    parentsRow.className = 'pedigree-row';
    parentsRow.appendChild(pedigreeCard(cat.parents[0], 'mother'));
    parentsRow.appendChild(pedigreeCard(cat.parents[1], 'father'));
    wrap.appendChild(parentsRow);
  } else {
    const founder = document.createElement('div');
    founder.className = 'pedigree-note';
    founder.textContent = 'Founder of the colony.';
    wrap.appendChild(founder);
  }

  // Children row (always show, even if empty, with a hint)
  if (cat.children && cat.children.length > 0) {
    const kidsLabel = document.createElement('div');
    kidsLabel.className = 'pedigree-divider';
    kidsLabel.textContent = `${cat.children.length} kitten${cat.children.length!==1?'s':''}`;
    wrap.appendChild(kidsLabel);
    const kidsRow = document.createElement('div');
    kidsRow.className = 'pedigree-row pedigree-kids';
    for (const kid of cat.children) {
      kidsRow.appendChild(pedigreeCard(kid, ''));
    }
    wrap.appendChild(kidsRow);
  } else if (cat.stage !== 'kitten' && cat.stage !== 'juvenile') {
    const none = document.createElement('div');
    none.className = 'pedigree-note';
    none.textContent = 'No kittens.';
    wrap.appendChild(none);
  }

  return wrap;
}

function sectionTitle(txt) {
  const d = document.createElement('div');
  d.className = 'section-title';
  d.textContent = txt;
  return d;
}

// Compute what aura (if any) this cat displays in the arena.
// Keep the logic in sync with the rendering in drawCat.
function computeAuraInfo(cat) {
  if (cat.sick) {
    return { label: 'Sickly', color: 'rgba(140,170,90,0.6)',
      desc: 'A pale greenish halo surrounds this cat. They are ill.' };
  }
  if (cat.fightGlow > 0.5) {
    return { label: 'Wounded', color: 'rgba(200,60,40,0.6)',
      desc: 'A red flash from recent fighting. Fades in moments.' };
  }
  if (cat.stage === 'kitten') return {};
  const g = cat.genes;
  const traits = [
    { val: g.aggression - 0.5,  label: 'Fierce',     desc: 'Coat tinted warm red. Highly aggressive — wins fights and defends against predators.', color: 'rgba(200,70,40,0.7)' },
    { val: g.boldness - 0.5,    label: 'Bold',       desc: 'Coat tinted orange. Bold disposition — better forager, attracts mates.',                 color: 'rgba(205,130,50,0.7)' },
    { val: g.energy - 0.5,      label: 'Vigorous',   desc: 'Coat tinted yellow. High energy — survives cold, plays often.',                          color: 'rgba(220,195,70,0.7)' },
    { val: g.sociability - 0.5, label: 'Sociable',   desc: 'Coat tinted green. Highly social — sleeps in piles, but catches illness faster.',       color: 'rgba(110,175,110,0.7)' },
    { val: g.playfulness - 0.5, label: 'Playful',    desc: 'Coat tinted violet. Loves to play — attracts mates, but burns energy.',                  color: 'rgba(175,125,200,0.7)' },
  ];
  let strongest = null, strongestAbs = 0.12;
  for (const t of traits) {
    if (Math.abs(t.val) > strongestAbs) { strongestAbs = Math.abs(t.val); strongest = t; }
  }
  if (!strongest) return {};
  if (strongest.val > 0) {
    return { label: strongest.label, color: strongest.color, desc: strongest.desc };
  } else {
    const negLabel = ({
      'Fierce':   'Gentle',
      'Bold':     'Timid',
      'Vigorous': 'Mellow',
      'Sociable': 'Aloof',
      'Playful':  'Reserved',
    })[strongest.label] || 'Subdued';
    const negDesc = ({
      'Fierce':   'Coat tinted cool blue. Very low aggression — peaceful, avoids fights.',
      'Bold':     'Coat tinted cool blue. Timid — avoids danger but forages less in lean times.',
      'Vigorous': 'Coat tinted cool blue. Low energy — efficient in droughts, vulnerable to cold.',
      'Sociable': 'Coat tinted cool blue. Aloof — avoids crowds, safer in epidemics.',
      'Playful':  'Coat tinted cool blue. Reserved — conserves energy, less attractive to mates.',
    })[strongest.label] || 'Coat tinted cool blue.';
    return { label: negLabel, color: 'rgba(85,125,165,0.7)', desc: negDesc };
  }
}

// Render the floating evolution tracker panel
function renderEvoTracker() {
  const rows = document.getElementById('evoRows');
  if (!rows || !state.founderGenes) return;
  const adults = state.cats.filter(c => !c.dying && c.stage !== 'kitten');
  if (adults.length === 0) { rows.innerHTML = '<div class="evo-row"><span style="font-size:10px;color:var(--ink-faint);font-style:italic">No adults yet</span></div>'; return; }
  const traits = [
    ['boldness', 'bold'],
    ['sociability', 'social'],
    ['playfulness', 'play'],
    ['aggression', 'aggro'],
    ['energy', 'energy'],
    ['appetite', 'appet.'],
  ];
  let html = '';
  for (const [k, label] of traits) {
    const mean = adults.reduce((s,c) => s + c.genes[k], 0) / adults.length;
    const founder = state.founderGenes[k];
    const delta = mean - founder;
    // -0.4 ... +0.4 maps to bar range
    const dispMax = 0.35;
    const w = clamp(Math.abs(delta) / dispMax, 0, 1) * 50;
    const cls = delta < 0 ? 'neg' : '';
    const side = delta < 0 ? `right:50%;` : `left:50%;`;
    const signStr = (delta>=0?'+':'') + (delta*100).toFixed(0);
    html += `<div class="evo-row"><span class="evo-label">${label}</span>
      <div class="evo-bar-wrap"><div class="evo-zero"></div>
      <div class="evo-fill ${cls}" style="${side}width:${w}%;"></div></div>
      <span class="evo-val">${signStr}</span></div>`;
  }
  // Body size
  const sizeMean = adults.reduce((s,c) => s + (c.bodyScale||1), 0) / adults.length;
  const sizeDelta = sizeMean - state.founderGenes.bodyScale;
  const sw = clamp(Math.abs(sizeDelta) / 0.3, 0, 1) * 50;
  const scls = sizeDelta < 0 ? 'neg' : '';
  const sside = sizeDelta < 0 ? `right:50%;` : `left:50%;`;
  html += `<div class="evo-row"><span class="evo-label">size</span>
    <div class="evo-bar-wrap"><div class="evo-zero"></div>
    <div class="evo-fill ${scls}" style="${sside}width:${sw}%;"></div></div>
    <span class="evo-val">${(sizeDelta>=0?'+':'')}${(sizeDelta*100).toFixed(0)}</span></div>`;
  rows.innerHTML = html;
}
function needBar(label, val, neutral=false) {
  const d = document.createElement('div');
  d.className = 'need-bar';
  const fillClass = neutral ? '' : (val < 0.2 ? 'danger' : val < 0.4 ? 'warn' : '');
  d.innerHTML = `<span class="label">${label}</span>
    <div class="track"><div class="fill ${fillClass}" style="width:${Math.round(val*100)}%"></div></div>
    <span class="val">${Math.round(val*100)}</span>`;
  return d;
}
function relateItem(label, val) {
  const d = document.createElement('div');
  d.className = 'relate-item';
  d.innerHTML = `<span class="label">${label}</span><span class="vals">${val}</span>`;
  return d;
}

function closeInspector() {
  document.getElementById('inspector').classList.remove('open');
  state.selectedCatId = null;
}
document.getElementById('inspector').addEventListener('click', (e) => {
  if (e.target.id === 'inspector') closeInspector();
});

// ─── END SCREEN ───────────────────────────────────────────────
function determineEndCause() {
  if (state.endedByUser) return 'You ended the run.';
  // Look at the most recent deaths to guess the cause
  const recent = state.deceased.slice(-Math.min(6, state.deceased.length));
  if (recent.length === 0) return 'The colony ended.';
  const causes = {};
  for (const d of recent) causes[d.diedOf] = (causes[d.diedOf]||0) + 1;
  const top = Object.entries(causes).sort((a,b)=>b[1]-a[1])[0];
  const cause = top[0];
  if (cause === 'old age') return 'The last cats died of old age.';
  if (cause === 'starvation') return 'The colony succumbed to starvation.';
  if (cause === 'orphaned') return 'Kittens were left without mothers.';
  if (cause === 'alone') return 'The final survivor outlived the line.';
  return `The colony ended (${cause}).`;
}

function endSimulation() {
  state.phase = 'ended';
  state.endCause = determineEndCause();

  // Gather the all-time roster
  const peakPop = state.history.length ? Math.max(...state.history.map(h=>h.pop), 0) : 0;
  const lastDiv = state.diversityHistory[state.diversityHistory.length-1] ?? 0;
  const initDiv = state.diversityHistory[0] ?? 0;

  // Notables — read from incrementally-tracked all-time records (not a full scan)
  const r = state.records;
  const mostProlific = r.mostProlific;
  const oldest = r.oldest;
  const mostFights = r.mostFights;
  const mostInbred = r.mostInbred;
  const biggest = r.biggest;

  // Build notable rows
  const notables = [];
  if (oldest) notables.push({ label: 'Oldest', name: oldest.name, detail: `${oldest.age.toFixed(0)} weeks · gen ${oldest.gen}` });
  if (mostProlific && mostProlific.children > 0) notables.push({ label: 'Most prolific', name: mostProlific.name, detail: `${mostProlific.children} kitten${mostProlific.children!==1?'s':''}` });
  if (mostFights && mostFights.fightCount > 0) notables.push({ label: 'Most fights', name: mostFights.name, detail: `${mostFights.fightCount} scrap${mostFights.fightCount!==1?'s':''}` });
  if (mostInbred && mostInbred.inbreedF > 0.05) notables.push({ label: 'Most inbred', name: mostInbred.name, detail: `F = ${mostInbred.inbreedF.toFixed(3)}` });
  if (biggest) notables.push({ label: 'Largest', name: biggest.name, detail: `${(biggest.bodyScale*100).toFixed(0)}% scale` });

  // Gene drift summary — compare first sample to last. Includes Size (bodyScale)
  // so the end-screen drift list reflects ALL evolving traits, not just the 6
  // behavioral genes (user: "doesn't reflect size").
  const traitLabels = {
    boldness:'Boldness', sociability:'Sociability', playfulness:'Playfulness',
    aggression:'Aggression', energy:'Energy', appetite:'Appetite', bodyScale:'Size'
  };
  const geneDrift = [];
  for (const [key, label] of Object.entries(traitLabels)) {
    const arr = state.geneHistory[key];
    if (arr.length < 2) continue;
    const start = arr[0];
    const end = arr[arr.length - 1];
    const delta = end - start;
    let dir = 'flat', arrow = '→';
    if (delta > 0.04) { dir = 'up'; arrow = '↑'; }
    else if (delta < -0.04) { dir = 'down'; arrow = '↓'; }
    geneDrift.push({ label, start: (start*100).toFixed(0), end: (end*100).toFixed(0), delta, dir, arrow });
  }

  // Environmental history — how many weeks of each event the colony weathered.
  // Shown next to the drift as honest context (not an n=1 causal claim): lean
  // events tend to favor small/efficient cats, abundance the opposite.
  const envEventLabels = { harshWinter: 'Harsh winters', predator: 'Predator pressure', drought: 'Droughts', epidemic: 'Epidemics', plentiful: 'Times of plenty' };
  const envHistoryRows = [];
  for (const [k, label] of Object.entries(envEventLabels)) {
    const wk = Math.round(state.eventExposure?.[k] || 0);
    if (wk >= 4) envHistoryRows.push({ label, weeks: wk });
  }
  envHistoryRows.sort((a, b) => b.weeks - a.weeks);

  // First appearances
  const firstsRows = [];
  const f = state.firsts;
  const phenotypeLabels = {
    'calico': 'First calico', 'tortie': 'First tortie',
    'white': 'First all-white', 'black': 'First black',
    'red': 'First red', 'cream': 'First cream',
    'blue': 'First blue', 'lilac': 'First lilac', 'chocolate': 'First chocolate',
  };
  for (const [key, label] of Object.entries(phenotypeLabels)) {
    if (f[key]) firstsRows.push({ label, name: f[key].name, detail: `week ${f[key].day}` });
  }
  if (f._longhair) firstsRows.push({ label: 'First longhair', name: f._longhair.name, detail: `week ${f._longhair.day}` });
  if (f._classic) firstsRows.push({ label: 'First classic tabby', name: f._classic.name, detail: `week ${f._classic.day}` });
  if (f._spotted) firstsRows.push({ label: 'First spotted tabby', name: f._spotted.name, detail: `week ${f._spotted.day}` });

  // Do any events actually cost cats? (drives whether to show the marker hint)
  const hasTollEvents = (state.eventTimeline || []).some(e => (e.toll || 0) >= 2);

  const c = document.getElementById('endContent');
  c.innerHTML = `
    <div class="end-title">The colony has ended.</div>
    <div class="end-subtitle">${Math.floor(state.simTime)} weeks observed</div>
    <div class="end-cause">${state.endCause}</div>

    <div class="stats-grid">
      <div class="stat-cell"><div class="label">Generations</div><div class="val">${state.generation}</div></div>
      <div class="stat-cell"><div class="label">Years observed</div><div class="val">${state.year}</div></div>
      <div class="stat-cell"><div class="label">Cats born</div><div class="val">${state.totalBorn}</div></div>
      <div class="stat-cell"><div class="label">Peak pop.</div><div class="val">${peakPop}</div></div>
      <div class="stat-cell"><div class="label">Illnesses</div><div class="val">${state.diseaseOutbreaks}</div></div>
      <div class="stat-cell"><div class="label">Stillborn</div><div class="val">${state.stillborn}</div></div>
      <div class="stat-cell"><div class="label">Longest life</div><div class="val">${state.longestLife.toFixed(0)}<span style="font-size:14px;color:var(--ink-faint)"> w</span></div><div class="sub">${state.longestLifeName||'—'}</div></div>
      <div class="stat-cell"><div class="label">Diversity drift</div><div class="val">${(initDiv*100).toFixed(0)}<span style="font-size:14px;color:var(--ink-faint)">→${(lastDiv*100).toFixed(0)}%</span></div></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Population over time</div>
      <canvas id="popChart"></canvas>
      ${hasTollEvents ? '<div class="chart-hint">Marks show events that cost cats — tap one for its toll.</div>' : ''}
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Genetic diversity</div>
      <canvas id="divChart"></canvas>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Gene drift (traits + size)</div>
      <canvas id="geneChart"></canvas>
    </div>

    ${geneDrift ? `
      <div class="section-title">How the line drifted</div>
      <div class="notable-list">
        ${geneDrift.map(d => `
          <div class="notable">
            <div><div class="who">${d.label}</div><div class="what">founder avg ${d.start}</div></div>
            <div class="what" style="color:${d.dir === 'up' ? 'var(--moss)' : d.dir === 'down' ? 'var(--terracotta)' : 'var(--ink-faint)'}">${d.arrow} ${d.end}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${envHistoryRows.length ? `
      <div class="section-title" style="margin-top:18px;">What the colony weathered</div>
      <div class="notable-list">
        ${envHistoryRows.map(e => `
          <div class="notable">
            <div><div class="who">${e.label}</div></div>
            <div class="what">${e.weeks} weeks</div>
          </div>
        `).join('')}
      </div>
      <div class="chart-hint" style="margin-top:6px;">Lean spells (drought, harsh winter) favor smaller, lighter-eating cats; abundance grows bigger, bolder ones. Compare with the drift above.</div>
    ` : ''}

    ${notables.length ? `
      <div class="section-title" style="margin-top:18px;">Notable cats</div>
      <div class="notable-list">
        ${notables.map(n => `
          <div class="notable">
            <div><div class="who">${n.name}</div><div class="what">${n.label}</div></div>
            <div class="what">${n.detail}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${firstsRows.length ? `
      <div class="section-title">First appearances</div>
      <div class="notable-list">
        ${firstsRows.map(n => `
          <div class="notable">
            <div><div class="who">${n.name}</div><div class="what">${n.label}</div></div>
            <div class="what">${n.detail}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <button class="restart-btn">Start a new colony</button>
  `;
  // Hide game UI so topbar/inspector don't compete with end screen
  document.getElementById('game').classList.remove('active');
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('confirmModal').classList.add('hidden');
  document.getElementById('end').classList.add('active');
  // Bind restart button (inline onclick won't work — script is a module)
  const restartBtn = document.querySelector('.restart-btn');
  if (restartBtn) restartBtn.addEventListener('click', restart);
  // Reset scroll on the end container in case it was scrolled before
  setTimeout(() => { document.getElementById('end').scrollTop = 0; }, 0);
  // Render charts after layout settles (two rAFs to be safe)
  requestAnimationFrame(() => requestAnimationFrame(() => {
    // Event markers only on the population chart (where toll is meaningful) —
    // they were noise on the diversity chart, which barely moves at those points.
    drawLineChart('popChart', state.history.map(h=>h.pop), '#5b7048', { events: state.eventTimeline });
    drawLineChart('divChart', state.diversityHistory, '#b3603e');
    drawGeneDriftChart('geneChart');
  }));
}

// Keep only events that actually mattered — harmful events that cost real cats
// (toll, attributed accurately in the sim) or seasons of plenty — and space them
// out so long runs stay legible. Uses the true death toll, not a misleading
// population-window delta (which conflated events with natural growth).
function significantEvents(events, W) {
  if (!events || !events.length) return [];
  const totalWeeks = state.simTime || 1;
  const sig = events.filter(e => (e.toll || 0) >= 2 || e.event === 'plentiful');
  sig.sort((a, b) => a.simTime - b.simTime);
  const minGapWk = totalWeeks * (16 / Math.max(60, W));   // keep markers ≥16px apart
  const kept = [];
  for (const s of sig) {
    const last = kept[kept.length - 1];
    if (last && s.simTime - last.simTime < minGapWk) {
      if ((s.toll || 0) > (last.toll || 0)) kept[kept.length - 1] = s;   // deadlier one wins the slot
    } else kept.push(s);
  }
  return kept;
}

function drawLineChart(canvasId, data, color, opts = {}) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const dpr = window.devicePixelRatio || 1;
  let W = Math.floor(c.getBoundingClientRect().width);
  if (W < 50 && c.parentElement) {
    const parentRect = c.parentElement.getBoundingClientRect();
    W = Math.max(240, Math.floor(parentRect.width) - 28);
  }
  if (W < 50) W = 320;
  const H = 130;
  c.width = W * dpr;
  c.height = H * dpr;
  c.style.width = '100%';
  c.style.height = H + 'px';
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // bg
  ctx.fillStyle = '#f7efd8';
  ctx.fillRect(0, 0, W, H);
  if (!data || data.length < 2) {
    ctx.fillStyle = '#8a8068';
    ctx.font = 'italic 12px Fraunces, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Not enough data yet', W/2, H/2);
    return;
  }
  const maxV = Math.max(...data, 1);
  // The x-axis spans simTime 0 to (data.length-1)*sampleInterval
  // We sample every 2 weeks, so total weeks = (data.length-1)*2 (rough)
  const totalWeeks = state.simTime || ((data.length-1) * 2);
  const xForTime = (t) => (t / Math.max(1, totalWeeks)) * W;

  // grid
  ctx.strokeStyle = '#d9c9a0';
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    const y = Math.floor(H * (i/5)) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Event markers (drawn behind line) — only those that moved the population,
  // spaced out for legibility on long runs.
  const events = significantEvents(opts.events || [], W);
  const eventColors = {
    harshWinter: '#4a6b8a',
    predator: '#8b4040',
    drought: '#b88a3c',
    epidemic: '#6b7c4a',
    plentiful: '#5b7048',
  };
  const hitZones = [];
  for (const e of events) {
    const x = xForTime(e.simTime);
    if (x < 0 || x > W) continue;
    const col = eventColors[e.event] || '#888';
    // Vertical line
    ctx.strokeStyle = col + '88';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
    // Small dot at top
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x, 6, 3, 0, Math.PI*2);
    ctx.fill();
    // Hit zone for tap
    hitZones.push({ x, y: 0, w: 8, h: H, event: e });
  }

  // area fill
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i/(data.length-1)) * W;
    const y = H - (data[i]/maxV) * (H-10) - 4;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = color + '22';
  ctx.fill();
  // line on top
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i/(data.length-1)) * W;
    const y = H - (data[i]/maxV) * (H-10) - 4;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();
  // max-value tick
  ctx.fillStyle = '#8a8068';
  ctx.font = '10px Albert Sans, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(maxV.toFixed(maxV < 1 ? 2 : 0), 4, 12);

  // Store hit zones for click handler
  c._hitZones = hitZones;
  c._chartW = W;
  c._chartH = H;
  // Attach click handler if not already
  if (!c._tooltipBound) {
    c._tooltipBound = true;
    c.addEventListener('click', (e) => {
      const rect = c.getBoundingClientRect();
      const px = ((e.clientX - rect.left) / rect.width) * (c._chartW || W);
      const py = ((e.clientY - rect.top) / rect.height) * (c._chartH || H);
      // Find nearest hit zone within 16px
      let best = null, bestDx = 16;
      for (const z of (c._hitZones || [])) {
        const dx = Math.abs(z.x - px);
        if (dx < bestDx) { bestDx = dx; best = z; }
      }
      if (best) showChartTooltip(c, best, e.clientX, e.clientY);
      else hideChartTooltip();
    });
  }
}

// Singleton tooltip for chart event markers
function showChartTooltip(canvas, hitZone, clientX, clientY) {
  let tip = document.getElementById('chartTooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'chartTooltip';
    document.body.appendChild(tip);
  }
  const e = hitZone.event;
  const eventLabels = {
    harshWinter: 'Harsh Winter',
    predator: 'Predator',
    drought: 'Drought',
    epidemic: 'Epidemic',
    plentiful: 'Plentiful',
  };
  const week = Math.floor(e.simTime);
  const year = Math.floor(e.simTime / 52) + 1;
  // Accurate impact: deaths this event actually caused (toll), or abundance.
  let impactLine = '';
  if (e.event === 'plentiful') {
    impactLine = `<div class="ct-impact" style="color:#5b7048">▲ a season of plenty</div>`;
  } else if (e.toll > 0) {
    impactLine = `<div class="ct-impact" style="color:#b3603e">✕ ${e.toll} cat${e.toll !== 1 ? 's' : ''} lost to it</div>`;
  }
  tip.innerHTML = `<div class="ct-title">${eventLabels[e.event] || e.event}</div>
    <div class="ct-when">Week ${week} · Year ${year} · ${e.season}</div>
    ${impactLine}
    <div class="ct-msg">${e.message || ''}</div>`;
  tip.style.display = 'block';
  // Position above the click
  const tipW = 220;
  let left = clientX - tipW/2;
  if (left < 8) left = 8;
  if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
  tip.style.left = left + 'px';
  tip.style.top = (clientY - 8) + 'px';
  // Auto-hide after a bit
  clearTimeout(tip._timer);
  tip._timer = setTimeout(hideChartTooltip, 5000);
}

function hideChartTooltip() {
  const tip = document.getElementById('chartTooltip');
  if (tip) tip.style.display = 'none';
}

// Multi-series chart for behavioral gene drift
function drawGeneDriftChart(canvasId) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const series = [
    {name:'bold',    key:'boldness',    color:'#b3603e'},
    {name:'social',  key:'sociability', color:'#5b7048'},
    {name:'play',    key:'playfulness', color:'#b88a3c'},
    {name:'aggro',   key:'aggression',  color:'#c47a6e'},
    {name:'energy',  key:'energy',      color:'#4a6b8a'},
    {name:'appetite',key:'appetite',    color:'#7a5a3a'},
    {name:'size',    key:'bodyScale',   color:'#2b3328', norm:true},  // phenotype ~0.45-1.6, normalized to fit
  ];
  const dpr = window.devicePixelRatio || 1;
  let W = Math.floor(c.getBoundingClientRect().width);
  if (W < 50 && c.parentElement) W = Math.max(240, Math.floor(c.parentElement.getBoundingClientRect().width) - 28);
  if (W < 50) W = 320;
  const H = 170;
  c.width = W * dpr; c.height = H * dpr;
  c.style.width = '100%'; c.style.height = H + 'px';
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#f7efd8';
  ctx.fillRect(0, 0, W, H);

  // Use 0-1 range for all behavioral genes
  const chartH = H - 28;          // leave room for legend
  // Grid at 0.25, 0.5, 0.75
  ctx.strokeStyle = '#d9c9a0';
  ctx.lineWidth = 1;
  for (const frac of [0.25, 0.5, 0.75]) {
    const y = Math.floor(chartH - frac*chartH) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // 0.5 label
  ctx.fillStyle = '#a39a7a';
  ctx.font = '10px Albert Sans, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('0.5', 4, Math.floor(chartH * 0.5) - 2);

  // Find max length to align all series to same x-axis
  let maxLen = 0;
  for (const s of series) maxLen = Math.max(maxLen, state.geneHistory[s.key].length);
  if (maxLen < 2) {
    ctx.fillStyle = '#8a8068';
    ctx.font = 'italic 12px Fraunces, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Not enough data yet', W/2, chartH/2);
    return;
  }

  for (const s of series) {
    const data = state.geneHistory[s.key];
    if (data.length < 2) continue;
    ctx.beginPath();
    for (let i = 0; i < data.length; i++) {
      const x = (i/(maxLen-1)) * W;
      const y = chartH - data[i] * chartH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.8;
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // Legend along bottom
  ctx.font = '9px Albert Sans, sans-serif';
  ctx.textBaseline = 'middle';
  const legY = H - 12;
  let legX = 6;
  for (const s of series) {
    ctx.fillStyle = s.color;
    ctx.fillRect(legX, legY - 3, 8, 6);
    legX += 11;
    ctx.fillStyle = '#5e5a48';
    ctx.textAlign = 'left';
    ctx.fillText(s.name, legX, legY);
    legX += ctx.measureText(s.name).width + 10;
  }
}
