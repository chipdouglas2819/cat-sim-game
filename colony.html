        cat.fightCount = (cat.fightCount || 0) + 1;
        cat.targetCat.fightCount = (cat.targetCat.fightCount || 0) + 1;
        cat.targetCat.state='flee';
        cat.targetCat.targetCat = cat;
        cat.targetCat.stateTimer = 2;
        if (Math.random()<0.05) {
          cat.floatTexts.push({text:'⚡', t:0, life:1});
          logEvent(`${cat.name} scrapped with ${cat.targetCat.name}`, 'event');
        }
        cat.state='wander';
      }
      break;
    }
    case 'flee': {
      if (!cat.targetCat) { cat.state='wander'; break; }
      const dx = cat.x - cat.targetCat.x;
      const dy = cat.y - cat.targetCat.y;
      const d = Math.hypot(dx,dy) || 1;
      cat.vx += (dx/d) * 1.5;
      cat.vy += (dy/d) * 1.5;
      if (cat.stateTimer < 0 || d > 200) cat.state='wander';
      break;
    }
  }
}

function moveToward(cat, tx, ty, speed) {
  const dx = tx - cat.x, dy = ty - cat.y;
  const d = Math.hypot(dx, dy) || 1;
  cat.vx += (dx/d) * speed * 0.15;
  cat.vy += (dy/d) * speed * 0.15;
}

// ─── BREEDING ─────────────────────────────────────────────────
function mate(a, b) {
  const female = a.sex==='F' ? a : b;
  const male = a.sex==='M' ? a : b;
  if (female.pregnantWith) return;
  female.pregnantWith = { fatherId: male.id, daysLeft: PREGNANCY_DAYS };
  female.cooldownUntil = state.simTime + PREGNANCY_DAYS + BREED_COOLDOWN;
  male.cooldownUntil = state.simTime + 6;
  a.state='wander'; b.state='wander';
  female.floatTexts.push({text:'♥', t:0, life:1.5});
  male.floatTexts.push({text:'♥', t:0, life:1.5});
  logEvent(`${female.name} and ${male.name} paired`, 'mate');
}

function giveBirth(mom) {
  const father = catById.get(mom.pregnantWith.fatherId);
  if (!father) { mom.pregnantWith = null; return; }
  const F = inbreedingCoefficient(mom.id, father.id);

  // ── LITTER SIZE: trait advantages are CONDITIONAL on environment ──
  // No trait gives unconditional reproductive advantage. Selection direction depends on context.
  let baseLitter = 3 + Math.floor(Math.random()*3);  // 3-5 base
  // Maternal condition matters (well-fed moms have more), but NOT body size directly
  const matFitness = clamp(mom.condition, 0.5, 1.2);
  // Trait bonus is now SMALL and conditional
  let traitBonus = 0;

  // SIZE TRADE-OFF: small mothers produce MORE kittens (r-strategy: many cheap offspring),
  // large mothers produce fewer but invest more per kitten (K-strategy: see survival advantages).
  traitBonus += (1 - mom.bodyScale) * 0.8;   // 0.6× body → +0.3 kittens, 1.5× body → -0.4 kittens

  // High boldness: better foraging in lean times, but extra predator risk loss
  // Net: small positive in plentiful, neutral or negative under predator pressure
  if (state.activeEvent === 'plentiful' || state.activeEvent === 'drought') {
    traitBonus += (mom.genes.boldness - 0.5) * 0.4;
  } else if (state.activeEvent === 'predator') {
    traitBonus -= (mom.genes.boldness - 0.5) * 0.3;   // bold moms get caught
  }
  // High energy: critical in winter, costs in drought (high metabolism)
  if (state.season === 'winter' || state.activeEvent === 'harshWinter') {
    traitBonus += (mom.genes.energy - 0.5) * 0.7;
  } else if (state.activeEvent === 'drought') {
    traitBonus -= (mom.genes.energy - 0.5) * 0.3;
  }
  // High aggression: defends kittens from predators, but costs in peaceful times
  if (state.activeEvent === 'predator') {
    traitBonus += (mom.genes.aggression - 0.5) * 0.5;
  } else if (state.activeEvent === 'plentiful' || (!state.activeEvent && state.season !== 'winter')) {
    // In peace, aggression is mildly counter-productive (burns energy on nothing)
    traitBonus -= (mom.genes.aggression - 0.5) * 0.15;
  }
  // High appetite: only beneficial when food is plentiful
  if (state.activeEvent === 'plentiful') {
    traitBonus += (mom.genes.appetite - 0.5) * 0.4;
  } else if (state.activeEvent === 'drought' || state.season === 'winter') {
    traitBonus -= (mom.genes.appetite - 0.5) * 0.5;   // high appetite suffers more in scarcity
  }
  // Sociability: helps in normal times (alloparenting), hurts in epidemics
  if (state.activeEvent === 'epidemic') {
    traitBonus -= (mom.genes.sociability - 0.5) * 0.4;
  } else {
    traitBonus += (mom.genes.sociability - 0.5) * 0.2;
  }
  // Father's body size only helps in defense scenarios
  if (state.activeEvent === 'predator') {
    traitBonus += (father.bodyScale - 1) * 0.3;
  }

  let litterSize = Math.max(0, Math.round(baseLitter * matFitness + traitBonus));
  litterSize = Math.min(litterSize, 7);
  // Postpartum mortality risk
  const motherRisk = (litterSize - 2) * 0.02 + (1 - mom.condition) * 0.08 + F * 0.05;
  const momWillDie = Math.random() < motherRisk;
  if (litterSize <= 0) { mom.pregnantWith = null; return; }
  const littermates = [];
  for (let i=0; i<litterSize; i++) {
    // Inbreeding may cause stillbirth. Also: extreme low-fitness moms have weaker kittens.
    const stillbornChance = F * 0.5 + (1 - matFitness) * 0.05;
    const sex = Math.random()<0.5 ? 'M' : 'F';
    const kgenes = inheritGenes(mom, father, sex);
    if (Math.random() < stillbornChance) {
      state.stillborn++;
      logEvent(`A kitten of ${mom.name} did not survive`, 'death');
      continue;
    }
    const kitten = createCat({
      sex, genes: kgenes,
      name: pick(NAME_POOL),
      parents: [mom.id, father.id],
      x: mom.x + (Math.random()-0.5)*16,
      y: mom.y + (Math.random()-0.5)*16,
    });
    parentsById.set(kitten.id, [mom.id, father.id]);
    kitten.hunger = 0.85;
    state.cats.push(kitten);
    state.totalBorn++;
    mom.children.push(kitten.id);
    father.children.push(kitten.id);
    // Track generation
    const gen = Math.max(mom._gen || 1, father._gen || 1) + 1;
    kitten._gen = gen;
    if (gen > state.generation) state.generation = gen;
    recordFirsts(kitten);
    // Initial affinity: positive toward mom and dad
    kitten.affinity.set(mom.id, 0.5);
    kitten.affinity.set(father.id, 0.3);
    // Mom recognizes her kitten
    mom.affinity.set(kitten.id, 0.6);
    father.affinity.set(kitten.id, 0.2);
    littermates.push(kitten);
  }
  // Wire littermate mutual affinity — they grow up bonded
  for (const a of littermates) {
    for (const b of littermates) {
      if (a !== b) a.affinity.set(b.id, 0.4);
    }
  }
  logEvent(`${mom.name} bore ${litterSize} kitten${litterSize>1?'s':''}${F>0.15?' (inbred)':''}`, 'birth');
  mom.pregnantWith = null;
  if (momWillDie) {
    // Mother dies in childbirth shortly after delivery
    setTimeout(() => triggerDeath(mom, 'childbirth'), 0);
  }
}

// ─── DEATH ────────────────────────────────────────────────────
function triggerDeath(cat, reason) {
  if (cat.dying) return;
  cat.dying = true;
  cat.dyingT = 0;
  cat.dyingReason = reason;
  cat.vx = cat.vy = 0;
  state.totalDied++;
  if (cat.age > state.longestLife) {
    state.longestLife = cat.age;
    state.longestLifeName = cat.name;
  }
  // Snapshot for pedigree + end-screen. Keep a compact record.
  const snapshot = {
    id: cat.id,
    name: cat.name,
    sex: cat.sex,
    age: cat.age,
    bornAt: cat.bornAt,
    diedAt: state.simTime,
    diedOf: reason,
    children: cat.children.length,
    childrenIds: [...cat.children],
    parents: cat.parents ? [...cat.parents] : null,
    fightCount: cat.fightCount || 0,
    inbreedF: cat.inbreedF || 0,
    bodyScale: cat.bodyScale || 1,
    phenotype: cat.phenotype,
    genes: cat.genes,
    gen: cat._gen || 1,
    wasFounder: state.founders.includes(cat.id),
  };
  // Track all-time records incrementally (so we don't scan a huge array at end)
  const r = state.records;
  if (!r.oldest      || snapshot.age        > r.oldest.age)            r.oldest = snapshot;
  if (!r.mostProlific|| snapshot.children   > r.mostProlific.children) r.mostProlific = snapshot;
  if (!r.mostFights  || snapshot.fightCount > r.mostFights.fightCount) r.mostFights = snapshot;
  if (!r.mostInbred  || snapshot.inbreedF   > r.mostInbred.inbreedF)   r.mostInbred = snapshot;
  if (!r.biggest     || snapshot.bodyScale  > r.biggest.bodyScale)     r.biggest = snapshot;
  // Push to deceased but cap the array — only recent dead are kept for pedigree lookups.
  state.deceased.push(snapshot);
  if (state.deceased.length > 400) state.deceased.shift();
  logEvent(`${cat.name} died (${reason}, week ${cat.age.toFixed(0)})`, 'death');
  // Maternal grief: if a kitten dies, mom withdraws socially for a while
  if (cat.stage === 'kitten' && cat.parents) {
    const mom = (() => { const _m = catById.get(cat.parents[0]); return _m && !_m.dying ? _m : null; })();
    if (mom) {
      mom.social = Math.min(mom.social, 0.15);   // social drive blunted
      if (state.cats.length < 500) mom.floatTexts.push({text: '…', t: 0, life: 2});
    }
  }
}

function drawDying(ctx, cat) {
  const t = cat.dyingT;
  // Phase 1 (0-1s): fade body to skull
  // Phase 2 (1-2.5s): skull
  // Phase 3 (2.5-3.5s): skull fades
  if (t < 1) {
    const opacity = 1 - t*0.6;
    ctx.globalAlpha = opacity;
    drawCat(ctx, cat, cat.x, cat.y - t*4, 1, cat.dir);
    ctx.globalAlpha = 1;
  } else if (t < 2.5) {
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = `rgba(40,30,20, ${Math.min(1, (t-1)*2)})`;
    ctx.fillText('💀', cat.x, cat.y - 4 - (t-1)*2);
  } else {
    const a = clamp(1 - (t-2.5), 0, 1);
    ctx.globalAlpha = a;
    ctx.font = '22px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2a2418';
    ctx.fillText('💀', cat.x, cat.y - 7 - (t-2.5)*6);
    ctx.globalAlpha = 1;
  }
}

// ─── EVENTS / LOG ─────────────────────────────────────────────
// Event-type priorities for high-pop filtering. 'major' tier passes always.
const EVENT_PRIORITY = { 'event': 1, 'birth': 2, 'mate': 2, 'death': 2, 'major': 5 };
// Substrings that mark colony-level messages that should always pass even at high pop
const MAJOR_KEYWORDS = ['Year ', 'Spring returns', 'Summer arrives', 'Fall sets in', 'Winter falls',
  'predator stalks', 'harsh winter', 'plentiful', 'drought', 'epidemic', 'Illness sweeps',
  'poor harvest', 'abundant fall', 'These cats are becoming'];

function isMajorEvent(text) {
  for (let i = 0; i < MAJOR_KEYWORDS.length; i++) {
    if (text.indexOf(MAJOR_KEYWORDS[i]) !== -1) return true;
  }
  return false;
}

function logEvent(text, type='event') {
  const pop = state.cats.length;
  // Above 500 cats: suppress everything except colony-level events
  if (pop > 500 && !isMajorEvent(text)) return;
  // Mid pop (200-500): drop low-priority events probabilistically
  if (pop > 200 && pop <= 500 && (EVENT_PRIORITY[type] || 1) < 2 && Math.random() < 0.6) return;
  state.events.unshift({simTime: state.simTime, text, type});
  if (state.events.length > 40) state.events.pop();
  // Time-throttle log render — at most once per 250ms
  const now = performance.now();
  if (!state._logRenderQueued && (now - (state._lastLogRender || 0)) > 250) {
    state._logRenderQueued = true;
    requestAnimationFrame(() => {
      state._logRenderQueued = false;
      state._lastLogRender = performance.now();
      renderLog();
    });
  }
}

function renderLog() {
  const wrap = document.getElementById('log');
  wrap.innerHTML = '';
  const recent = state.events.slice(0, 4);
  for (const e of recent) {
    const div = document.createElement('div');
    div.className = `log-entry event-${e.type}`;
    div.textContent = e.text;
    wrap.appendChild(div);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────
function tick(time) {
  if (state.phase === 'running') {
    if (!state.lastTime) state.lastTime = time;
    const realDt = Math.min((time - state.lastTime) / 1000, 1/15);
    state.lastTime = time;
    const dt = realDt / SIM_DAY_REAL_SEC * state.speed;
    state.simTime += dt;
    // Season + year tracking
    const newSeason = deriveSeason(state.simTime);
    const newYear = deriveYear(state.simTime);
    if (newSeason !== state.season) {
      state.season = newSeason;
      const seasonMsg = newSeason === 'spring' ? 'Spring returns. Breeding season begins.' :
                        newSeason === 'summer' ? 'Summer arrives.' :
                        newSeason === 'fall' ? 'Fall sets in. Breeding season ends.' :
                        'Winter falls over the colony.';
      logEvent(seasonMsg, 'event');
      // Roll for seasonal environmental event
      rollSeasonalEvent(newSeason);
    }
    if (newYear !== state.year) {
      state.year = newYear;
      logEvent(`Year ${newYear} begins.`, 'event');
      // Weather drifts year-to-year — emergent climate variation
      driftWeather();
      // Live gene drift narration — report meaningful shifts from founder genes
      if (state.founderGenes && state.year > 1) {
        const adults = state.cats.filter(c => !c.dying && c.stage !== 'kitten');
        if (adults.length >= 4) {
          const phrases = {
            boldness:    ['bolder', 'more timid'],
            sociability: ['more social', 'more aloof'],
            playfulness: ['more playful', 'more serious'],
            aggression:  ['more aggressive', 'gentler'],
            energy:      ['more energetic', 'mellower'],
            appetite:    ['hungrier eaters', 'lighter eaters'],
          };
          const shifts = [];
          for (const t of Object.keys(phrases)) {
            const curMean = adults.reduce((s,c) => s + c.genes[t], 0) / adults.length;
            const founderMean = state.founderGenes[t];
            const delta = curMean - founderMean;
            const lastDelta = state.lastDriftAnnouncement[t] || 0;
            // Only announce if drift exceeds 0.12 AND has changed substantially since last announcement
            if (Math.abs(delta) > 0.12 && Math.abs(delta - lastDelta) > 0.06) {
              shifts.push({trait: t, delta, phrase: phrases[t][delta > 0 ? 0 : 1]});
              state.lastDriftAnnouncement[t] = delta;
            }
          }
          // Body size drift
          const curBody = adults.reduce((s,c) => s + (c.bodyScale||1), 0) / adults.length;
          const bodyDelta = curBody - state.founderGenes.bodyScale;
          const lastBodyDelta = state.lastDriftAnnouncement.bodyScale || 0;
          if (Math.abs(bodyDelta) > 0.08 && Math.abs(bodyDelta - lastBodyDelta) > 0.04) {
            shifts.push({trait: 'bodyScale', delta: bodyDelta, phrase: bodyDelta > 0 ? 'larger' : 'smaller'});
            state.lastDriftAnnouncement.bodyScale = bodyDelta;
          }
          // Announce the biggest shift this year
          if (shifts.length) {
            shifts.sort((a,b) => Math.abs(b.delta) - Math.abs(a.delta));
            const top = shifts[0];
            logEvent(`These cats are becoming ${top.phrase} than their forebears.`, 'event');
          }
        }
      }
    }

    // Auto-spawn food at feeding spots — burst-refills to target so late game is sustainable
    if (state.simTime - state.lastAutoFood > FOOD_SPAWN_INTERVAL) {
      const livingPop = state.cats.filter(c => !c.dying).length;
      // Add additional feeding spots as the colony grows so cats don't all pile on the same few
      const desiredSpots = livingPop >= 35 ? 6 : livingPop >= 22 ? 5 : livingPop >= 12 ? 4 : 3;
      while (state.feedSpots.length < desiredSpots) {
        const ang = Math.random() * Math.PI * 2;
        const radius = Math.min(arenaW, arenaH) * (0.18 + Math.random()*0.22);
        state.feedSpots.push({
          x: clamp(arenaW/2 + Math.cos(ang)*radius, 60, arenaW-60),
          y: clamp(arenaH/2 + Math.sin(ang)*radius, 130, arenaH-60),
        });
      }
      // Environmental carrying capacity — food production has hard limits.
      // Lower cap = smaller colony = each death matters = visible evolution.
      // colonyScale (player setting) shifts the whole equilibrium: smaller = faster evolution.
      const colonyScale = state.colonyScale || 1;
      const areaCap = Math.max(15, Math.floor((arenaW * arenaH) / 20000 * colonyScale));
      let envMult = 1;
      if (state.season === 'winter') envMult *= 0.5;
      else if (state.season === 'fall') envMult *= 0.8;
      else if (state.season === 'summer') envMult *= 1.1;
      if (state.activeEvent === 'plentiful') envMult *= 1.6;
      else if (state.activeEvent === 'drought') envMult *= 0.35;
      else if (state.activeEvent === 'harshWinter') envMult *= 0.6;
      const envCap = Math.max(6, Math.floor(areaCap * envMult));
      // Target = whichever is LOWER: per-cat demand OR environmental ceiling.
      // When pop exceeds env capacity, food gets scarce — starvation deaths cull naturally.
      const demand = Math.ceil(livingPop * FOOD_PER_CAT);
      const targetFood = Math.max(FOOD_TARGET_MIN, Math.min(demand, envCap));
      const shortfall = targetFood - state.food.length;
      if (shortfall > 0) {
        const dynamicBurst = Math.max(FOOD_BURST_MAX, Math.ceil(livingPop / 25));
        const toSpawn = Math.min(shortfall, dynamicBurst);
        for (let i = 0; i < toSpawn; i++) {
          if (Math.random() < FOOD_RANDOM_CHANCE) {
            dropFood(rand(70, arenaW-70), rand(150, arenaH-70));
          } else {
            const spot = state.feedSpots[Math.floor(Math.random()*state.feedSpots.length)];
            const ang = Math.random() * Math.PI * 2;
            const r = 12 + Math.random() * FOOD_SPOT_JITTER;
            dropFood(
              clamp(spot.x + Math.cos(ang)*r, 50, arenaW-50),
              clamp(spot.y + Math.sin(ang)*r, 130, arenaH-50)
            );
          }
        }
      }
      state.lastAutoFood = state.simTime;
    }

    // Remove expired food
    state.food = state.food.filter(f => state.simTime - f.bornAt < FOOD_LIFETIME && f.amount > 0.01);

    // Rebuild spatial index once before any neighbor queries this tick
    rebuildSpatialIndex();

    // Update cats
    for (const cat of state.cats) updateCat(cat, dt);
    // Remove dead-faded
    state.cats = state.cats.filter(c => !c._remove);

    // Sample history
    if (Math.floor(state.simTime/2) > state.history.length) {
      state.history.push({day: state.simTime, pop: state.cats.length, born: state.totalBorn, died: state.totalDied});
      state.diversityHistory.push(computeDiversity());
      // Gene drift sample — mean of each behavioral gene across living adults
      const adults = state.cats.filter(c => !c.dying && c.stage !== 'kitten');
      if (adults.length > 0) {
        const traits = ['boldness','sociability','playfulness','aggression','energy','appetite'];
        for (const t of traits) {
          const mean = adults.reduce((s,c) => s + c.genes[t], 0) / adults.length;
          state.geneHistory[t].push(mean);
        }
        const sizeMean = adults.reduce((s,c) => s + (c.bodyScale||1), 0) / adults.length;
        state.geneHistory.bodyScale.push(sizeMean);
      } else {
        // Carry forward last value (or push 0.5)
        for (const t of ['boldness','sociability','playfulness','aggression','energy','appetite']) {
          const last = state.geneHistory[t];
          last.push(last.length ? last[last.length-1] : 0.5);
        }
        const last = state.geneHistory.bodyScale;
        last.push(last.length ? last[last.length-1] : 1);
      }
      // Update visible evo tracker if open
      const tr = document.getElementById('evoTracker');
      if (tr && !tr.classList.contains('hidden')) renderEvoTracker();
    }

    // Check end — sim ends when ≤1 cat alive (a lone cat can't breed)
    const livingCount = state.cats.filter(c => !c.dying).length;
    if (livingCount <= 1) {
      // wait for dying animations to finish, then a brief grace for the lone cat
      state._endTimer = (state._endTimer || 0) + dt * SIM_DAY_REAL_SEC / state.speed; // real seconds
      const allDead = livingCount === 0 && state.cats.length === 0;
      const loneSurvivor = livingCount === 1 && state.cats.length === 1;
      // End immediately if all dying-fades are done, OR after 3 real seconds with a lone survivor
      if (allDead) endSimulation();
      else if (loneSurvivor && state._endTimer > 3) {
        // mark the survivor as dying ('alone') so its fade plays into the end screen
        const lone = state.cats.find(c => !c.dying);
        if (lone) {
          logEvent(`${lone.name} is the last cat. The line ends.`, 'death');
          triggerDeath(lone, 'alone');
        }
      }
    } else if (state._endTimer) {
      state._endTimer = 0;
    }

    // UI updates
    document.getElementById('dayCount').textContent = Math.floor(state.simTime);
    document.getElementById('popCount').textContent = state.cats.filter(c=>!c.dying).length;
    // Week sub: "spring · Y4"
    const weekSub = document.getElementById('weekSub');
    weekSub.textContent = `${state.season} · Y${state.year}`;
    weekSub.className = 'stat-sub ' + state.season;
    // Cat sub: "Gen 3"
    document.getElementById('catSub').textContent = 'Gen ' + state.generation;
    // Event banner
    const banner = document.getElementById('eventBanner');
    if (state.activeEvent) {
      banner.textContent = state.activeEventMessage;
      banner.className = state.activeEvent;
    } else {
      banner.className = 'hidden';
    }
  } else {
    state.lastTime = time;
  }

  // Render
  if (state.phase !== 'setup') render();

  requestAnimationFrame(tick);
}

function render() {
  const ctx = canvas.getContext('2d');
  drawArena(ctx);
  // Food first
  for (const f of state.food) drawFood(ctx, f);
  // Cats sorted by y for fake depth
  const sorted = [...state.cats].sort((a,b)=>a.y-b.y);
  for (const cat of sorted) {
    if (cat.dying) drawDying(ctx, cat);
    else drawCat(ctx, cat, cat.x, cat.y, 1, cat.dir);
  }
}

// ─── DIVERSITY ────────────────────────────────────────────────
function computeDiversity() {
  const live = state.cats.filter(c=>!c.dying);
  if (live.length === 0) return 0;
  // Combine: visible-gene heterozygosity + behavioral gene spread (std dev).
  // The behavioral component matters because that's what the player watches evolve.
  let hetSum = 0;
  for (const c of live) {
    let het = 0;
    const n = 6;
    for (const k of ['B','D','A','S','L','W']) {
      if (c.genes[k][0] !== c.genes[k][1]) het++;
    }
    hetSum += het / n;
  }
  const visibleHet = hetSum / live.length;
  // Behavioral spread: mean of per-trait standard deviations (0 = clones, higher = diverse)
  const traits = ['boldness','sociability','playfulness','aggression','energy','appetite','size'];
  let spreadSum = 0;
  for (const t of traits) {
    let mean = 0;
    for (const c of live) mean += c.genes[t];
    mean /= live.length;
    let varSum = 0;
    for (const c of live) { const d = c.genes[t] - mean; varSum += d*d; }
    spreadSum += Math.sqrt(varSum / live.length);
  }
  const behavioralSpread = spreadSum / traits.length;   // ~0 to ~0.3
  // Blend the two into a single 0-1 diversity index (behavioral scaled to comparable range)
  return clamp(visibleHet * 0.5 + (behavioralSpread / 0.3) * 0.5, 0, 1);
}

// ─── INPUT ────────────────────────────────────────────────────
function onArenaTap(e) {
  if (state.phase !== 'running') return;
  const rect = canvas.getBoundingClientRect();
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;
  // Find tapped cat
  let tappedCat = null, bestD = 30;
  for (const c of state.cats) {
    if (c.dying) continue;
    const d = Math.hypot(c.x-x, c.y-y);
    if (d < bestD) { bestD = d; tappedCat = c; }
  }
  if (tappedCat) {
    openInspector(tappedCat);
  } else {
    // Drop food
    dropFood(x, y);
  }
}

// ─── INSPECTOR ────────────────────────────────────────────────
function openInspector(cat) {
  state.selectedCatId = cat.id;
  const panel = document.getElementById('inspectorPanel');
  panel.innerHTML = '';
  const handle = document.createElement('div');
  handle.className = 'panel-handle';
  panel.appendChild(handle);

  // Head
  const head = document.createElement('div');
  head.className = 'inspector-head';
  const portrait = document.createElement('div');
  portrait.className = 'inspector-portrait';
  const pc = document.createElement('canvas');
  pc.width = 80; pc.height = 80;
  portrait.appendChild(pc);
  setTimeout(()=>{
    const pctx = pc.getContext('2d');
    pctx.clearRect(0,0,80,80);
    drawCat(pctx, cat, 40, 45, 1.6, 0);
  },0);
  head.appendChild(portrait);
  const meta = document.createElement('div');
  meta.className = 'inspector-meta';
  const nameI = document.createElement('input');
  nameI.className = 'inspector-name';
  nameI.value = cat.name;
  nameI.maxLength = 16;
  nameI.addEventListener('input', () => { cat.name = nameI.value || cat.name; });
  meta.appendChild(nameI);
  const sub = document.createElement('div');
  sub.className = 'inspector-subline';
  let sublineExtra = '';
  if (cat.sex === 'F' && cat.stage !== 'kitten' && !cat.pregnantWith) {
    sublineExtra = cat.inEstrus ? ' · in heat' : ' · not in heat';
  }
  const gen = cat._gen || 1;
  const sizePct = Math.round((cat.bodyScale || 1) * 100);
  const sizeWord = cat.bodyScale < 0.7 ? 'small' : cat.bodyScale > 1.3 ? 'large' : 'average';
  sub.textContent = `${cat.sex==='M'?'♂':'♀'} · G${gen} · ${cat.stage} · ${cat.age.toFixed(0)}w · ${sizeWord} (${sizePct}%) · ${cat.phenotype.description}${sublineExtra}`;
  meta.appendChild(sub);
  // Special trait badges
  if (cat.rareTraits && cat.rareTraits.length) {
    const badges = document.createElement('div');
    badges.className = 'rare-badges';
    for (const t of cat.rareTraits) {
      const span = document.createElement('span');
      span.className = 'rare-badge';
      span.textContent = t;
      badges.appendChild(span);
    }
    meta.appendChild(badges);
  }
  head.appendChild(meta);
  panel.appendChild(head);

  // Needs
  panel.appendChild(sectionTitle('Needs'));
  const needs = document.createElement('div');
  needs.className = 'needs-bars';
  needs.appendChild(needBar('Hunger', cat.hunger));
  needs.appendChild(needBar('Energy', cat.energy));
  needs.appendChild(needBar('Social', cat.social));
  needs.appendChild(needBar('Condition', cat.condition !== undefined ? cat.condition : 1));
  panel.appendChild(needs);

  // Genes
  panel.appendChild(sectionTitle('Visible genes'));
  const vg = document.createElement('div');
  vg.className = 'gene-grid';
  const visibles = [
    ['B (black)', cat.genes.B.join('')],
    ['D (dense)', cat.genes.D.join('')],
    ['A (agouti)', cat.genes.A.join('')],
    ['T (tabby)', cat.genes.T.join('/')],
    ['S (white)', cat.genes.S.join('')],
    ['L (hair)', cat.genes.L.join('')],
    ['W (white)', cat.genes.W.join('')],
    ['O (orange)', cat.genes.O.join('') + (cat.sex==='M'?'/Y':'')],
  ];
  for (const [k,v] of visibles) {
    const row = document.createElement('div');
    row.className = 'gene-row';
    row.innerHTML = `<span class="gene-name">${k}</span><span class="gene-val">${v}</span>`;
    vg.appendChild(row);
  }
  panel.appendChild(vg);

  // Behavior
  panel.appendChild(sectionTitle('Disposition'));
  const bg = document.createElement('div');
  bg.className = 'needs-bars';
  bg.appendChild(needBar('Bold', cat.genes.boldness, true));
  bg.appendChild(needBar('Social', cat.genes.sociability, true));
  bg.appendChild(needBar('Playful', cat.genes.playfulness, true));
  bg.appendChild(needBar('Aggro', cat.genes.aggression, true));
  bg.appendChild(needBar('Energy', cat.genes.energy, true));
  bg.appendChild(needBar('Appetite', cat.genes.appetite, true));
  if (cat.genes.size !== undefined) bg.appendChild(needBar('Size', cat.genes.size, true));
  panel.appendChild(bg);

  // Coat tint — explains what trait color (if any) shifts this cat's coat in the arena
  panel.appendChild(sectionTitle('Coat tint'));
  const auraInfo = computeAuraInfo(cat);
  const auraDiv = document.createElement('div');
  auraDiv.className = 'aura-info';
  if (auraInfo.label) {
    auraDiv.innerHTML = `<span class="aura-swatch" style="background:${auraInfo.color}"></span>
      <div class="aura-text"><div class="aura-label">${auraInfo.label}</div>
      <div class="aura-desc">${auraInfo.desc}</div></div>`;
  } else {
    auraDiv.innerHTML = `<div class="aura-text"><div class="aura-desc" style="font-style:italic;color:var(--ink-faint)">No notable tint — traits near population baseline.</div></div>`;
  }
  panel.appendChild(auraDiv);

  // Relations
  panel.appendChild(sectionTitle('Family'));
  panel.appendChild(buildPedigree(cat));
  if (cat.pregnantWith) {
    const preg = document.createElement('div');
    preg.className = 'pedigree-note';
    preg.textContent = `Pregnant · ${cat.pregnantWith.daysLeft.toFixed(0)} weeks left`;
    panel.appendChild(preg);
  }

  if (cat.inbreedF > 0.02) {
    const coef = document.createElement('div');
    coef.className = 'coefficient-display';
    coef.innerHTML = `Inbreeding coefficient <strong>F = ${cat.inbreedF.toFixed(3)}</strong> — affects lifespan and kitten viability`;
    panel.appendChild(coef);
  }

  document.getElementById('inspector').classList.add('open');
}

// Helper: find a cat by id (alive or deceased)
function findCatById(id) {
  if (id == null) return null;
  const alive = catById.get(id);
  if (alive) return { record: alive, alive: true };
  const dead = state.deceased.find(d => d.id === id);
  if (dead) return { record: dead, alive: false };
  return null;
}

// Build a small portrait card for one ancestor/descendant in the pedigree
function pedigreeCard(catId, role) {
  const found = findCatById(catId);
  const card = document.createElement('div');
  card.className = 'pedigree-card' + (found ? '' : ' missing') + (found && !found.alive ? ' deceased' : '');
  if (!found) {
    card.innerHTML = `<div class="ped-portrait"></div><div class="ped-name">unknown</div><div class="ped-role">${role}</div>`;
    return card;
  }
  const c = found.record;
  // Tiny canvas portrait
  const portraitWrap = document.createElement('div');
  portraitWrap.className = 'ped-portrait';
  const pc = document.createElement('canvas');
  pc.width = 48; pc.height = 48;
  portraitWrap.appendChild(pc);
  card.appendChild(portraitWrap);
  // Render the cat at small scale
  setTimeout(() => {
    const ctx = pc.getContext('2d');
    ctx.clearRect(0,0,48,48);
    // For deceased records we don't have x/y/state — use an adult template
    const renderCat = found.alive ? c : {
      ...c, x: 24, y: 24, vx: 0, vy: 0, dir: 0, state: 'wander',
      stage: c.age < KITTEN_DAYS ? 'kitten' : c.age < ADULT_END ? 'adult' : 'senior',
      floatTexts: [], bornFlash: 0, fightGlow: 0, sick: false,
      condition: 1, hunger: 0.8, energy: 0.8,
      pregnantWith: null,
    };
    drawCat(ctx, renderCat, 24, 28, 1, 0);
  }, 0);
  const nameDiv = document.createElement('div');
  nameDiv.className = 'ped-name';
  nameDiv.textContent = c.name;
  card.appendChild(nameDiv);
  const roleDiv = document.createElement('div');
  roleDiv.className = 'ped-role';
  roleDiv.textContent = role + (found.alive ? '' : ' †');
  card.appendChild(roleDiv);
  // Make alive cats tappable to inspect them
  if (found.alive) {
    card.classList.add('tappable');
    card.addEventListener('click', (e) => {
      e.stopPropagation();
      openInspector(c);
    });
  }
  return card;
}

function buildPedigree(cat) {
  const wrap = document.createElement('div');
  wrap.className = 'pedigree';

  // Parents row
  if (cat.parents) {
    const parentsRow = document.createElement('div');
    parentsRow.className = 'pedigree-row';
    parentsRow.appendChild(pedigreeCard(cat.parents[0], 'mother'));
    parentsRow.appendChild(pedigreeCard(cat.parents[1], 'father'));
    wrap.appendChild(parentsRow);
  } else {
    const founder = document.createElement('div');
    founder.className = 'pedigree-note';
    founder.textContent = 'Founder of the colony.';
    wrap.appendChild(founder);
  }

  // Children row (always show, even if empty, with a hint)
  if (cat.children && cat.children.length > 0) {
    const kidsLabel = document.createElement('div');
    kidsLabel.className = 'pedigree-divider';
    kidsLabel.textContent = `${cat.children.length} kitten${cat.children.length!==1?'s':''}`;
    wrap.appendChild(kidsLabel);
    const kidsRow = document.createElement('div');
    kidsRow.className = 'pedigree-row pedigree-kids';
    for (const kid of cat.children) {
      kidsRow.appendChild(pedigreeCard(kid, ''));
    }
    wrap.appendChild(kidsRow);
  } else if (cat.stage !== 'kitten' && cat.stage !== 'juvenile') {
    const none = document.createElement('div');
    none.className = 'pedigree-note';
    none.textContent = 'No kittens.';
    wrap.appendChild(none);
  }

  return wrap;
}

function sectionTitle(txt) {
  const d = document.createElement('div');
  d.className = 'section-title';
  d.textContent = txt;
  return d;
}

// Compute what aura (if any) this cat displays in the arena.
// Keep the logic in sync with the rendering in drawCat.
function computeAuraInfo(cat) {
  if (cat.sick) {
    return { label: 'Sickly', color: 'rgba(140,170,90,0.6)',
      desc: 'A pale greenish halo surrounds this cat. They are ill.' };
  }
  if (cat.fightGlow > 0.5) {
    return { label: 'Wounded', color: 'rgba(200,60,40,0.6)',
      desc: 'A red flash from recent fighting. Fades in moments.' };
  }
  if (cat.stage === 'kitten') return {};
  const g = cat.genes;
  const traits = [
    { val: g.aggression - 0.5,  label: 'Fierce',     desc: 'Coat tinted warm red. Highly aggressive — wins fights and defends against predators.', color: 'rgba(200,70,40,0.7)' },
    { val: g.boldness - 0.5,    label: 'Bold',       desc: 'Coat tinted orange. Bold disposition — better forager, attracts mates.',                 color: 'rgba(205,130,50,0.7)' },
    { val: g.energy - 0.5,      label: 'Vigorous',   desc: 'Coat tinted yellow. High energy — survives cold, plays often.',                          color: 'rgba(220,195,70,0.7)' },
    { val: g.sociability - 0.5, label: 'Sociable',   desc: 'Coat tinted green. Highly social — sleeps in piles, but catches illness faster.',       color: 'rgba(110,175,110,0.7)' },
    { val: g.playfulness - 0.5, label: 'Playful',    desc: 'Coat tinted violet. Loves to play — attracts mates, but burns energy.',                  color: 'rgba(175,125,200,0.7)' },
  ];
  let strongest = null, strongestAbs = 0.12;
  for (const t of traits) {
    if (Math.abs(t.val) > strongestAbs) { strongestAbs = Math.abs(t.val); strongest = t; }
  }
  if (!strongest) return {};
  if (strongest.val > 0) {
    return { label: strongest.label, color: strongest.color, desc: strongest.desc };
  } else {
    const negLabel = ({
      'Fierce':   'Gentle',
      'Bold':     'Timid',
      'Vigorous': 'Mellow',
      'Sociable': 'Aloof',
      'Playful':  'Reserved',
    })[strongest.label] || 'Subdued';
    const negDesc = ({
      'Fierce':   'Coat tinted cool blue. Very low aggression — peaceful, avoids fights.',
      'Bold':     'Coat tinted cool blue. Timid — avoids danger but forages less in lean times.',
      'Vigorous': 'Coat tinted cool blue. Low energy — efficient in droughts, vulnerable to cold.',
      'Sociable': 'Coat tinted cool blue. Aloof — avoids crowds, safer in epidemics.',
      'Playful':  'Coat tinted cool blue. Reserved — conserves energy, less attractive to mates.',
    })[strongest.label] || 'Coat tinted cool blue.';
    return { label: negLabel, color: 'rgba(85,125,165,0.7)', desc: negDesc };
  }
}

// Render the floating evolution tracker panel
function renderEvoTracker() {
  const rows = document.getElementById('evoRows');
  if (!rows || !state.founderGenes) return;
  const adults = state.cats.filter(c => !c.dying && c.stage !== 'kitten');
  if (adults.length === 0) { rows.innerHTML = '<div class="evo-row"><span style="font-size:10px;color:var(--ink-faint);font-style:italic">No adults yet</span></div>'; return; }
  const traits = [
    ['boldness', 'bold'],
    ['sociability', 'social'],
    ['playfulness', 'play'],
    ['aggression', 'aggro'],
    ['energy', 'energy'],
    ['appetite', 'appet.'],
  ];
  let html = '';
  for (const [k, label] of traits) {
    const mean = adults.reduce((s,c) => s + c.genes[k], 0) / adults.length;
    const founder = state.founderGenes[k];
    const delta = mean - founder;
    // -0.4 ... +0.4 maps to bar range
    const dispMax = 0.35;
    const w = clamp(Math.abs(delta) / dispMax, 0, 1) * 50;
    const cls = delta < 0 ? 'neg' : '';
    const side = delta < 0 ? `right:50%;` : `left:50%;`;
    const signStr = (delta>=0?'+':'') + (delta*100).toFixed(0);
    html += `<div class="evo-row"><span class="evo-label">${label}</span>
      <div class="evo-bar-wrap"><div class="evo-zero"></div>
      <div class="evo-fill ${cls}" style="${side}width:${w}%;"></div></div>
      <span class="evo-val">${signStr}</span></div>`;
  }
  // Body size
  const sizeMean = adults.reduce((s,c) => s + (c.bodyScale||1), 0) / adults.length;
  const sizeDelta = sizeMean - state.founderGenes.bodyScale;
  const sw = clamp(Math.abs(sizeDelta) / 0.3, 0, 1) * 50;
  const scls = sizeDelta < 0 ? 'neg' : '';
  const sside = sizeDelta < 0 ? `right:50%;` : `left:50%;`;
  html += `<div class="evo-row"><span class="evo-label">size</span>
    <div class="evo-bar-wrap"><div class="evo-zero"></div>
    <div class="evo-fill ${scls}" style="${sside}width:${sw}%;"></div></div>
    <span class="evo-val">${(sizeDelta>=0?'+':'')}${(sizeDelta*100).toFixed(0)}</span></div>`;
  rows.innerHTML = html;
}
function needBar(label, val, neutral=false) {
  const d = document.createElement('div');
  d.className = 'need-bar';
  const fillClass = neutral ? '' : (val < 0.2 ? 'danger' : val < 0.4 ? 'warn' : '');
  d.innerHTML = `<span class="label">${label}</span>
    <div class="track"><div class="fill ${fillClass}" style="width:${Math.round(val*100)}%"></div></div>
    <span class="val">${Math.round(val*100)}</span>`;
  return d;
}
function relateItem(label, val) {

  d.className = 'relate-item';
  d.innerHTML = `<span class="label">${label}</span><span class="vals">${val}</span>`;
  return d;
}

function closeInspector() {

}
document.getElementById('inspector').addEventListener('click', (e) => {

// ─── END SCREEN ───────────────────────────────────────────────
function determineEndCause() {
  if (state.endedByUser) return 'You ended the run.';
  // Look at the most recent deaths to guess the cause
  const recent = state.deceased.slice(-Math.min(6, state.deceased.length));
  if (recent.length === 0) return 'The colony ended.';
  const causes = {};
  for (const d of recent) causes[d.diedOf] = (causes[d.diedOf]||0) + 1;
  const top = Object.entries(causes).sort((a,b)=>b[1]-a[1])[0];
  const cause = top[0];
  if (cause === 'old age') return 'The last cats died of old age.';
  if (cause === 'starvation') return 'The colony succumbed to starvation.';
  if (cause === 'orphaned') return 'Kittens were left without mothers.';
  if (cause === 'alone') return 'The final survivor outlived the line.';
  return `The colony ended (${cause}).`;
}

function endSimulation() {
  state.phase = 'ended';
  state.endCause = determineEndCause();

  // Gather the all-time roster
  const peakPop = state.history.length ? Math.max(...state.history.map(h=>h.pop), 0) : 0;
  const lastDiv = state.diversityHistory[state.diversityHistory.length-1] ?? 0;
  const initDiv = state.diversityHistory[0] ?? 0;

  // Notables — read from incrementally-tracked all-time records (not a full scan)
  const r = state.records;
  const mostProlific = r.mostProlific;
  const oldest = r.oldest;
  const mostFights = r.mostFights;
  const mostInbred = r.mostInbred;
  const biggest = r.biggest;

  // Build notable rows
  const notables = [];
  if (oldest) notables.push({ label: 'Oldest', name: oldest.name, detail: `${oldest.age.toFixed(0)} weeks · gen ${oldest.gen}` });
  if (mostProlific && mostProlific.children > 0) notables.push({ label: 'Most prolific', name: mostProlific.name, detail: `${mostProlific.children} kitten${mostProlific.children!==1?'s':''}` });
  if (mostFights && mostFights.fightCount > 0) notables.push({ label: 'Most fights', name: mostFights.name, detail: `${mostFights.fightCount} scrap${mostFights.fightCount!==1?'s':''}` });
  if (mostInbred && mostInbred.inbreedF > 0.05) notables.push({ label: 'Most inbred', name: mostInbred.name, detail: `F = ${mostInbred.inbreedF.toFixed(3)}` });
  if (biggest) notables.push({ label: 'Largest', name: biggest.name, detail: `${(biggest.bodyScale*100).toFixed(0)}% scale` });

  // Gene drift summary — compare first sample to last
  const traitLabels = {
    boldness:'Boldness', sociability:'Sociability', playfulness:'Playfulness',
    aggression:'Aggression', energy:'Energy', appetite:'Appetite'
  };
  const geneDrift = [];
  for (const [key, label] of Object.entries(traitLabels)) {
    const arr = state.geneHistory[key];
    if (arr.length < 2) continue;
    const start = arr[0];
    const end = arr[arr.length - 1];
    const delta = end - start;
    let dir = 'flat', arrow = '→';
    if (delta > 0.04) { dir = 'up'; arrow = '↑'; }
    else if (delta < -0.04) { dir = 'down'; arrow = '↓'; }
    geneDrift.push({ label, start: (start*100).toFixed(0), end: (end*100).toFixed(0), delta, dir, arrow });
  }

  // First appearances
  const firstsRows = [];
  const f = state.firsts;
  const phenotypeLabels = {
    'calico': 'First calico', 'tortie': 'First tortie',
    'white': 'First all-white', 'black': 'First black',
    'red': 'First red', 'cream': 'First cream',
    'blue': 'First blue', 'lilac': 'First lilac', 'chocolate': 'First chocolate',
  };
  for (const [key, label] of Object.entries(phenotypeLabels)) {
    if (f[key]) firstsRows.push({ label, name: f[key].name, detail: `week ${f[key].day}` });
  }
  if (f._longhair) firstsRows.push({ label: 'First longhair', name: f._longhair.name, detail: `week ${f._longhair.day}` });
  if (f._classic) firstsRows.push({ label: 'First classic tabby', name: f._classic.name, detail: `week ${f._classic.day}` });
  if (f._spotted) firstsRows.push({ label: 'First spotted tabby', name: f._spotted.name, detail: `week ${f._spotted.day}` });

  const c = document.getElementById('endContent');
  c.innerHTML = `
    <div class="end-title">The colony has ended.</div>
    <div class="end-subtitle">${Math.floor(state.simTime)} weeks observed</div>
    <div class="end-cause">${state.endCause}</div>

    <div class="stats-grid">
      <div class="stat-cell"><div class="label">Generations</div><div class="val">${state.generation}</div></div>
      <div class="stat-cell"><div class="label">Years observed</div><div class="val">${state.year}</div></div>
      <div class="stat-cell"><div class="label">Cats born</div><div class="val">${state.totalBorn}</div></div>
      <div class="stat-cell"><div class="label">Peak pop.</div><div class="val">${peakPop}</div></div>
      <div class="stat-cell"><div class="label">Illnesses</div><div class="val">${state.diseaseOutbreaks}</div></div>
      <div class="stat-cell"><div class="label">Stillborn</div><div class="val">${state.stillborn}</div></div>
      <div class="stat-cell"><div class="label">Longest life</div><div class="val">${state.longestLife.toFixed(0)}<span style="font-size:14px;color:var(--ink-faint)"> w</span></div><div class="sub">${state.longestLifeName||'—'}</div></div>
      <div class="stat-cell"><div class="label">Diversity drift</div><div class="val">${(initDiv*100).toFixed(0)}<span style="font-size:14px;color:var(--ink-faint)">→${(lastDiv*100).toFixed(0)}%</span></div></div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Population over time</div>
      <canvas id="popChart"></canvas>
      ${state.eventTimeline.length > 0 ? '<div class="chart-hint">Tap a marker to see what happened.</div>' : ''}
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Genetic diversity (heterozygosity)</div>
      <canvas id="divChart"></canvas>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">Behavioral gene drift</div>
      <canvas id="geneChart"></canvas>
    </div>

    ${geneDrift ? `
      <div class="section-title">How the line drifted</div>
      <div class="notable-list">
        ${geneDrift.map(d => `
          <div class="notable">
            <div><div class="who">${d.label}</div><div class="what">founder avg ${d.start}</div></div>
            <div class="what" style="color:${d.dir === 'up' ? 'var(--moss)' : d.dir === 'down' ? 'var(--terracotta)' : 'var(--ink-faint)'}">${d.arrow} ${d.end}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${notables.length ? `
      <div class="section-title" style="margin-top:18px;">Notable cats</div>
      <div class="notable-list">
        ${notables.map(n => `
          <div class="notable">
            <div><div class="who">${n.name}</div><div class="what">${n.label}</div></div>
            <div class="what">${n.detail}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    ${firstsRows.length ? `
      <div class="section-title">First appearances</div>
      <div class="notable-list">
        ${firstsRows.map(n => `
          <div class="notable">
            <div><div class="who">${n.name}</div><div class="what">${n.label}</div></div>
            <div class="what">${n.detail}</div>
          </div>
        `).join('')}
      </div>
    ` : ''}

    <button class="restart-btn">Start a new colony</button>
  `;
  // Hide game UI so topbar/inspector don't compete with end screen
  document.getElementById('game').classList.remove('active');
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('confirmModal').classList.add('hidden');
  document.getElementById('end').classList.add('active');
  // Bind restart button (inline onclick won't work — script is a module)
  const restartBtn = document.querySelector('.restart-btn');
  if (restartBtn) restartBtn.addEventListener('click', restart);
  // Reset scroll on the end container in case it was scrolled before
  setTimeout(() => { document.getElementById('end').scrollTop = 0; }, 0);
  // Render charts after layout settles (two rAFs to be safe)
  requestAnimationFrame(() => requestAnimationFrame(() => {
    drawLineChart('popChart', state.history.map(h=>h.pop), '#5b7048', { events: state.eventTimeline });
    drawLineChart('divChart', state.diversityHistory, '#b3603e', { events: state.eventTimeline });
    drawGeneDriftChart('geneChart');
  }));
}

function drawLineChart(canvasId, data, color, opts = {}) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const dpr = window.devicePixelRatio || 1;
  let W = Math.floor(c.getBoundingClientRect().width);
  if (W < 50 && c.parentElement) {
    const parentRect = c.parentElement.getBoundingClientRect();
    W = Math.max(240, Math.floor(parentRect.width) - 28);
  }
  if (W < 50) W = 320;
  const H = 130;
  c.width = W * dpr;
  c.height = H * dpr;
  c.style.width = '100%';
  c.style.height = H + 'px';
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // bg
  ctx.fillStyle = '#f7efd8';
  ctx.fillRect(0, 0, W, H);
  if (!data || data.length < 2) {
    ctx.fillStyle = '#8a8068';
    ctx.font = 'italic 12px Fraunces, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Not enough data yet', W/2, H/2);
    return;
  }
  const maxV = Math.max(...data, 1);
  // The x-axis spans simTime 0 to (data.length-1)*sampleInterval
  // We sample every 2 weeks, so total weeks = (data.length-1)*2 (rough)
  const totalWeeks = state.simTime || ((data.length-1) * 2);
  const xForTime = (t) => (t / Math.max(1, totalWeeks)) * W;

  // grid
  ctx.strokeStyle = '#d9c9a0';
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    const y = Math.floor(H * (i/5)) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Event markers (drawn behind line)
  const events = opts.events || [];
  const eventColors = {
    harshWinter: '#4a6b8a',
    predator: '#8b4040',
    drought: '#b88a3c',
    epidemic: '#6b7c4a',
    plentiful: '#5b7048',
  };
  const hitZones = [];
  for (const e of events) {
    const x = xForTime(e.simTime);
    if (x < 0 || x > W) continue;
    const col = eventColors[e.event] || '#888';
    // Vertical line
    ctx.strokeStyle = col + '88';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
    // Small dot at top
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(x, 6, 3, 0, Math.PI*2);
    ctx.fill();
    // Hit zone for tap
    hitZones.push({ x, y: 0, w: 8, h: H, event: e });
  }

  // area fill
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i/(data.length-1)) * W;
    const y = H - (data[i]/maxV) * (H-10) - 4;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fillStyle = color + '22';
  ctx.fill();
  // line on top
  ctx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = (i/(data.length-1)) * W;
    const y = H - (data[i]/maxV) * (H-10) - 4;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();
  // max-value tick
  ctx.fillStyle = '#8a8068';
  ctx.font = '10px Albert Sans, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(maxV.toFixed(maxV < 1 ? 2 : 0), 4, 12);

  // Store hit zones for click handler
  c._hitZones = hitZones;
  c._chartW = W;
  c._chartH = H;
  // Attach click handler if not already
  if (!c._tooltipBound) {
    c._tooltipBound = true;
    c.addEventListener('click', (e) => {
      const rect = c.getBoundingClientRect();
      const px = ((e.clientX - rect.left) / rect.width) * (c._chartW || W);
      const py = ((e.clientY - rect.top) / rect.height) * (c._chartH || H);
      // Find nearest hit zone within 16px
      let best = null, bestDx = 16;
      for (const z of (c._hitZones || [])) {
        const dx = Math.abs(z.x - px);
        if (dx < bestDx) { bestDx = dx; best = z; }
      }
      if (best) showChartTooltip(c, best, e.clientX, e.clientY);
      else hideChartTooltip();
    });
  }
}

// Singleton tooltip for chart event markers
function showChartTooltip(canvas, hitZone, clientX, clientY) {
  let tip = document.getElementById('chartTooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'chartTooltip';
    document.body.appendChild(tip);
  }
  const e = hitZone.event;
  const eventLabels = {
    harshWinter: 'Harsh Winter',
    predator: 'Predator',
    drought: 'Drought',
    epidemic: 'Epidemic',
    plentiful: 'Plentiful',
  };
  const week = Math.floor(e.simTime);
  const year = Math.floor(e.simTime / 52) + 1;
  tip.innerHTML = `<div class="ct-title">${eventLabels[e.event] || e.event}</div>
    <div class="ct-when">Week ${week} · Year ${year} · ${e.season}</div>
    <div class="ct-msg">${e.message || ''}</div>`;
  tip.style.display = 'block';
  // Position above the click
  const tipW = 220;
  let left = clientX - tipW/2;
  if (left < 8) left = 8;
  if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
  tip.style.left = left + 'px';
  tip.style.top = (clientY - 8) + 'px';
  // Auto-hide after a bit
  clearTimeout(tip._timer);
  tip._timer = setTimeout(hideChartTooltip, 5000);
}

function hideChartTooltip() {
  const tip = document.getElementById('chartTooltip');
  if (tip) tip.style.display = 'none';
}

// Multi-series chart for behavioral gene drift
function drawGeneDriftChart(canvasId) {
  const c = document.getElementById(canvasId);
  if (!c) return;
  const series = [
    {name:'bold',    key:'boldness',    color:'#b3603e'},
    {name:'social',  key:'sociability', color:'#5b7048'},
    {name:'play',    key:'playfulness', color:'#b88a3c'},
    {name:'aggro',   key:'aggression',  color:'#c47a6e'},
    {name:'energy',  key:'energy',      color:'#4a6b8a'},
    {name:'appetite',key:'appetite',    color:'#7a5a3a'},
  ];
  const dpr = window.devicePixelRatio || 1;
  let W = Math.floor(c.getBoundingClientRect().width);
  if (W < 50 && c.parentElement) W = Math.max(240, Math.floor(c.parentElement.getBoundingClientRect().width) - 28);
  if (W < 50) W = 320;
  const H = 170;
  c.width = W * dpr; c.height = H * dpr;
  c.style.width = '100%'; c.style.height = H + 'px';
  const ctx = c.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#f7efd8';
  ctx.fillRect(0, 0, W, H);

  // Use 0-1 range for all behavioral genes
  const chartH = H - 28;          // leave room for legend
  // Grid at 0.25, 0.5, 0.75
  ctx.strokeStyle = '#d9c9a0';
  ctx.lineWidth = 1;
  for (const frac of [0.25, 0.5, 0.75]) {
    const y = Math.floor(chartH - frac*chartH) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // 0.5 label
  ctx.fillStyle = '#a39a7a';
  ctx.font = '10px Albert Sans, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('0.5', 4, Math.floor(chartH * 0.5) - 2);

  // Find max length to align all series to same x-axis
  let maxLen = 0;
  for (const s of series) maxLen = Math.max(maxLen, state.geneHistory[s.key].length);
  if (maxLen < 2) {
    ctx.fillStyle = '#8a8068';
    ctx.font = 'italic 12px Fraunces, serif';
    ctx.textAlign = 'center';
    ctx.fillText('Not enough data yet', W/2, chartH/2);
    return;
  }

  for (const s of series) {
    const data = state.geneHistory[s.key];
    if (data.length < 2) continue;
    ctx.beginPath();
    for (let i = 0; i < data.length; i++) {
      const x = (i/(maxLen-1)) * W;
      const y = chartH - data[i] * chartH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1.8;
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // Legend along bottom
  ctx.font = '9px Albert Sans, sans-serif';
  ctx.textBaseline = 'middle';
  const legY = H - 12;
  let legX = 6;
  for (const s of series) {
    ctx.fillStyle = s.color;
    ctx.fillRect(legX, legY - 3, 8, 6);
    legX += 11;
    ctx.fillStyle = '#5e5a48';
    ctx.textAlign = 'left';
    ctx.fillText(s.name, legX, legY);
    legX += ctx.measureText(s.name).width + 10;
  }
}

// ─── SETUP UI ─────────────────────────────────────────────────
function initSetup() {
  // Stage both cats
  state.starter.A = { sex:'M', genes: rollGenes('M'), name: pick(NAME_POOL) };
  state.starter.B = { sex:'F', genes: rollGenes('F'), name: pick(NAME_POOL) };
  refreshCard('A');
  refreshCard('B');
}

function refreshCard(key) {
  const cat = state.starter[key];
  const ph = calculatePhenotype(cat.genes, cat.sex);
  // preview
  const canvasEl = document.querySelector(`canvas[data-preview="${key}"]`);
  const ctx = canvasEl.getContext('2d');
  ctx.clearRect(0,0,canvasEl.width, canvasEl.height);
  // background subtle
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0,0,canvasEl.width, canvasEl.height);
  const fake = { ...cat, phenotype: ph, age: 60, stage:'adult', state:'wander', floatTexts:[], bornFlash:0, id: key==='A'?1:2 };
  drawCat(ctx, fake, canvasEl.width/2, canvasEl.height/2 + 10, 2.2, 0);

  // name
  document.querySelector(`input[data-name="${key}"]`).value = cat.name;

  // tags
  const tagWrap = document.querySelector(`[data-tags="${key}"]`);
  tagWrap.innerHTML = '';
  for (const t of genesToTags(cat.genes, cat.sex, ph)) {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagWrap.appendChild(span);
  }

  // sliders
  const sliderWrap = document.querySelector(`[data-sliders="${key}"]`);
  sliderWrap.innerHTML = '';
  for (const trait of ['boldness','sociability','playfulness','aggression','energy','appetite']) {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const lbl = document.createElement('div');
    lbl.className = 'slider-label';
    const niceName = trait[0].toUpperCase()+trait.slice(1);
    lbl.innerHTML = `<span>${niceName}</span><span class="val">${(cat.genes[trait]*100).toFixed(0)}</span>`;
    const inp = document.createElement('input');
    inp.type = 'range'; inp.min = 0; inp.max = 100;
    inp.value = Math.round(cat.genes[trait]*100);
    inp.addEventListener('input', () => {
      cat.genes[trait] = inp.value/100;
      lbl.querySelector('.val').textContent = inp.value;
      // Update tags
      const newph = calculatePhenotype(cat.genes, cat.sex);
      tagWrap.innerHTML='';
      for (const t of genesToTags(cat.genes, cat.sex, newph)) {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        tagWrap.appendChild(span);
      }
    });
    row.appendChild(lbl);
    row.appendChild(inp);
    sliderWrap.appendChild(row);
  }
}

document.addEventListener('click', (e) => {
  const reroll = e.target.closest('[data-reroll]');
  if (reroll) {
    const k = reroll.dataset.reroll;
    state.starter[k] = { sex: k==='A'?'M':'F', genes: rollGenes(k==='A'?'M':'F'), name: pick(NAME_POOL) };
    refreshCard(k);
    return;
  }
  const rerollLook = e.target.closest('[data-reroll-look]');
  if (rerollLook) {
    const k = rerollLook.dataset.rerollLook;
    const cur = state.starter[k];
    const sex = cur.sex;
    const newg = rollGenes(sex);
    // keep behavioral, replace visible
    for (const v of ['B','D','A','T','S','L','W','O']) cur.genes[v] = newg[v];
    refreshCard(k);
    return;
  }
  const expBtn = e.target.closest('.expander-toggle');
  if (expBtn) {
    expBtn.parentElement.classList.toggle('open');
    return;
  }
  if (e.target.id === 'rollBoth') {
    state.starter.A = { sex:'M', genes: rollGenes('M'), name: pick(NAME_POOL) };
    state.starter.B = { sex:'F', genes: rollGenes('F'), name: pick(NAME_POOL) };
    refreshCard('A'); refreshCard('B');
    return;
  }
  if (e.target.id === 'beginBtn') {
    beginSim();
    return;
  }
});
document.addEventListener('input', (e) => {
  if (e.target.dataset.name) {
    state.starter[e.target.dataset.name].name = e.target.value;
  }
});

// ─── BEGIN SIM ────────────────────────────────────────────────
let canvas, ctx;
function beginSim() {
  // hide setup, show game
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').classList.add('active');
  state.phase = 'running';
  state.cats = [];
  state.food = [];
  state.feedSpots = [];
  state.simTime = 0;
  state.lastTime = 0;
  state.events = [];
  state.history = [];
  state.diversityHistory = [];
  state.geneHistory = { boldness:[], sociability:[], playfulness:[], aggression:[], energy:[], appetite:[], bodyScale:[] };
  state.season = 'spring';
  state.year = 1;
  state.diseaseOutbreaks = 0;
  state.activeEvent = null;
  state.activeEventMessage = '';
  state.eventLog = [];
  state.eventTimeline = [];
  state.climate = makeStartingWeather();
  state.deceased = [];
  state.records = { oldest: null, mostProlific: null, mostFights: null, mostInbred: null, biggest: null };
  state.colonyScale = 1;

  // resize canvas
  canvas = document.getElementById('arena');
  resize();

  // Place feeding spots — fixed locations where food regenerates
  // Distribute roughly evenly across the arena
  for (let i = 0; i < FEED_SPOTS_COUNT; i++) {
    const ang = (i / FEED_SPOTS_COUNT) * Math.PI * 2 + Math.random()*0.4 - 0.2;
    const radius = Math.min(arenaW, arenaH) * 0.28;
    state.feedSpots.push({
      x: arenaW/2 + Math.cos(ang) * radius + (Math.random()-0.5)*30,
      y: arenaH/2 + Math.sin(ang) * radius + (Math.random()-0.5)*30,
    });
  }

  // build starting cats — male and female, both adult, placed in middle
  const A = createCat({
    sex:'M', genes: state.starter.A.genes, name: state.starter.A.name,
    age: 50,
    x: arenaW*0.4, y: arenaH*0.5,
  });
  A._gen = 1;
  const B = createCat({
    sex:'F', genes: state.starter.B.genes, name: state.starter.B.name,
    age: 50,
    x: arenaW*0.6, y: arenaH*0.5,
  });
  B._gen = 1;
  state.cats.push(A, B);
  state.founders = [A.id, B.id];
  recordFirsts(A);
  recordFirsts(B);
  // Snapshot founder behavioral gene means for live drift narration
  state.founderGenes = {};
  state.lastDriftAnnouncement = {};
  for (const t of ['boldness','sociability','playfulness','aggression','energy','appetite']) {
    state.founderGenes[t] = (A.genes[t] + B.genes[t]) / 2;
  }
  state.founderGenes.bodyScale = (A.bodyScale + B.bodyScale) / 2;
  state.lastDriftCheck = 0;
  // bias them toward each other initially
  A.social = 0.3; B.social = 0.3;
  logEvent(`${A.name} & ${B.name} settle into the colony.`, 'event');
  // seed initial food at the feeding spots
  for (const spot of state.feedSpots) {
    const ang = Math.random() * Math.PI * 2;
    dropFood(spot.x + Math.cos(ang)*15, spot.y + Math.sin(ang)*15);
  }
}

// We use a virtual canvas size in logical pixels.
// arenaW / arenaH hold the logical drawing size.
let arenaW = 0, arenaH = 0;
function resize() {
  canvas = document.getElementById('arena');
  const dpr = window.devicePixelRatio || 1;
  arenaW = window.innerWidth;
  arenaH = window.innerHeight;
  canvas.width = arenaW * dpr;
  canvas.height = arenaH * dpr;
  canvas.style.width = arenaW + 'px';
  canvas.style.height = arenaH + 'px';
  const ctx2 = canvas.getContext('2d');
  ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Shadow logical dims onto canvas object for any old refs:
  canvas._w = arenaW;
  canvas._h = arenaH;
}

window.addEventListener('resize', () => {
  if (state.phase !== 'setup') resize();
});

// arena tap
window.addEventListener('DOMContentLoaded', () => {
  const arena = document.getElementById('arena');
  arena.addEventListener('click', onArenaTap);

  // speed controls
  document.getElementById('speedControls').addEventListener('click', (e) => {
    const btn = e.target.closest('.speed-btn');
    if (!btn) return;
    const sp = parseInt(btn.dataset.speed);
    state.speed = sp;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b===btn));
  });

  // Evolution tracker toggle
  document.getElementById('evoToggle').addEventListener('click', () => {
    const tr = document.getElementById('evoTracker');
    tr.classList.toggle('hidden');
    if (!tr.classList.contains('hidden')) renderEvoTracker();
  });

  // End run button → confirmation modal
  document.getElementById('endRunBtn').addEventListener('click', () => {
    if (state.phase !== 'running') return;
    document.getElementById('confirmModal').classList.remove('hidden');
  });
  document.getElementById('confirmCancel').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
  });
  document.getElementById('confirmEnd').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
    state.endedByUser = true;
    // Snapshot all surviving cats into deceased so the end screen has full data
    for (const c of state.cats) {
      if (!c.dying) {
        // Use synthetic death — adds them to deceased without playing the fade
        const snap = {
          id: c.id, name: c.name, sex: c.sex, age: c.age, bornAt: c.bornAt,
          diedAt: state.simTime, diedOf: 'survived',
          children: c.children.length, childrenIds: [...c.children],
          parents: c.parents ? [...c.parents] : null,
          fightCount: c.fightCount || 0,
          inbreedF: c.inbreedF || 0, bodyScale: c.bodyScale || 1,
          phenotype: c.phenotype, genes: c.genes, gen: c._gen || 1,
          wasFounder: state.founders.includes(c.id),
        };
        // Update all-time records with survivors
        const r = state.records;
        if (!r.oldest      || snap.age        > r.oldest.age)            r.oldest = snap;
        if (!r.mostProlific|| snap.children   > r.mostProlific.children) r.mostProlific = snap;
        if (!r.mostFights  || snap.fightCount > r.mostFights.fightCount) r.mostFights = snap;
        if (!r.mostInbred  || snap.inbreedF   > r.mostInbred.inbreedF)   r.mostInbred = snap;
        if (!r.biggest     || snap.bodyScale  > r.biggest.bodyScale)     r.biggest = snap;
        state.deceased.push(snap);
        if (state.deceased.length > 400) state.deceased.shift();
      }
    }
    endSimulation();
  });

  initSetup();
  requestAnimationFrame(tick);
});

window.restart = restart;

</script>
