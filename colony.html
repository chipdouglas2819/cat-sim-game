// ─── SETUP UI ─────────────────────────────────────────────────
function initSetup() {
  // Stage both cats
  state.starter.A = { sex:'M', genes: rollGenes('M'), name: pick(NAME_POOL) };
  state.starter.B = { sex:'F', genes: rollGenes('F'), name: pick(NAME_POOL) };
  refreshCard('A');
  refreshCard('B');
}

// ─── CAT PRESETS (localStorage) ───────────────────────────────
// Save a whole founder (look + personality + name) so a player can always reload
// their cat. Stored as a small array under one key. Genes carry whitePattern/
// eyeOverride/behavioral values, so a loaded cat looks AND acts as saved (the
// player can then hit 'Random traits' to keep the look but reroll personality).
function getPresets() {
  try { return JSON.parse(localStorage.getItem('colony_presets') || '[]'); } catch { return []; }
}
function savePreset(name, cat) {
  const presets = getPresets();
  presets.push({ name, sex: cat.sex, genes: { ...cat.genes }, savedAt: Date.now() });
  if (presets.length > 24) presets.shift();   // cap
  localStorage.setItem('colony_presets', JSON.stringify(presets));
}
function renderPresetList(key) {
  const list = document.querySelector(`[data-presets="${key}"]`);
  if (!list) return;
  const presets = getPresets();
  if (!presets.length) { list.innerHTML = '<div class="preset-empty">No saved cats yet. Tap ★ Save cat.</div>'; return; }
  list.innerHTML = '';
  presets.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'preset-item';
    const sexMark = p.sex === 'M' ? '♂' : '♀';
    row.innerHTML = `<button class="preset-load btn-pill" data-load-preset="${i}" data-slot="${key}">${sexMark} ${(p.name||'cat').replace(/[<>&]/g,'')}</button>`
      + `<button class="preset-del" data-del-preset="${i}" data-slot="${key}" title="Delete">✕</button>`;
    list.appendChild(row);
  });
}

function refreshCard(key) {
  const cat = state.starter[key];
  const ph = calculatePhenotype(cat.genes, cat.sex);
  // preview
  const canvasEl = document.querySelector(`canvas[data-preview="${key}"]`);
  const ctx = canvasEl.getContext('2d');
  ctx.clearRect(0,0,canvasEl.width, canvasEl.height);
  // background subtle
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0,0,canvasEl.width, canvasEl.height);
  const fake = { ...cat, phenotype: ph, age: 60, stage:'adult', state:'wander', floatTexts:[], bornFlash:0, id: key==='A'?1:2 };
  drawCat(ctx, fake, canvasEl.width/2, canvasEl.height/2 + 10, 2.2, 0);

  // name
  document.querySelector(`input[data-name="${key}"]`).value = cat.name;

  // tags
  const tagWrap = document.querySelector(`[data-tags="${key}"]`);
  tagWrap.innerHTML = '';
  for (const t of genesToTags(cat.genes, cat.sex, ph)) {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagWrap.appendChild(span);
  }

  // sliders
  const sliderWrap = document.querySelector(`[data-sliders="${key}"]`);
  sliderWrap.innerHTML = '';
  for (const trait of ['boldness','sociability','playfulness','aggression','energy','appetite']) {
    const row = document.createElement('div');
    row.className = 'slider-row';
    const lbl = document.createElement('div');
    lbl.className = 'slider-label';
    const niceName = trait[0].toUpperCase()+trait.slice(1);
    lbl.innerHTML = `<span>${niceName}</span><span class="val">${(cat.genes[trait]*100).toFixed(0)}</span>`;
    const inp = document.createElement('input');
    inp.type = 'range'; inp.min = 0; inp.max = 100;
    inp.value = Math.round(cat.genes[trait]*100);
    inp.addEventListener('input', () => {
      cat.genes[trait] = inp.value/100;
      lbl.querySelector('.val').textContent = inp.value;
      // Update tags
      const newph = calculatePhenotype(cat.genes, cat.sex);
      tagWrap.innerHTML='';
      for (const t of genesToTags(cat.genes, cat.sex, newph)) {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        tagWrap.appendChild(span);
      }
    });
    row.appendChild(lbl);
    row.appendChild(inp);
    sliderWrap.appendChild(row);
  }

  // ── APPEARANCE PICKER ── cycle-able choosers for each visible trait, so the
  // player can DESIGN a founder's look (not just reroll). Each option sets the
  // underlying alleles to achieve that phenotype, then redraws the preview.
  buildAppearancePicker(key, cat);
}

// ── APPEARANCE MODEL ──────────────────────────────────────────
// A `look` object is the SINGLE SOURCE OF TRUTH for a founder's appearance. The
// UI sets look.<trait> directly (tap a pill), then applyLookToGenes writes the
// visible alleles. No lossy get/set round-trip → no arrow desync, and every
// option is always selectable (tortie auto-hidden for males). Behavioral genes
// and eyeOverride are untouched here.
const LOOK_TRAITS = [
  { key: 'color', label: 'Color',
    options: ['White','Black','Blue','Chocolate','Lilac','Red','Cream','Tortie'],
    // 'Tortie' only applies to females; filtered in the UI by sex.
  },
  { key: 'pattern', label: 'Pattern', options: ['Solid','Mackerel','Classic','Spotted','Ticked'] },
  { key: 'white', label: 'White', options: ['Solid','Locket','Mitted','Tuxedo','Bicolor','Van'] },
  { key: 'fur', label: 'Fur', options: ['Short','Long'] },
  { key: 'point', label: 'Point', options: ['No','Colorpoint'] },
  { key: 'eyes', label: 'Eyes', options: ['Auto','Gold','Copper','Green','Amber','Hazel','Blue'] },
];
const EYE_HEX = { Gold:'#e8d24a', Copper:'#7a4a1e', Green:'#5fa45a', Amber:'#d39b2c', Hazel:'#9fae5a', Blue:'#bcdcee' };

// Derive a look object from a freshly-rolled gene set (so 'Re-roll'/initial cats
// show the right pills). Maps genes → the closest look option.
function genesToLook(genes, sex) {
  const ph = calculatePhenotype(genes, sex);
  let color;
  if (genes.W && genes.W.includes('W')) color = 'White';
  else if (ph.baseColor === 'tortie' || ph.baseColor === 'calico') color = 'Tortie';
  else if (ph.orangeMode === 'full') color = (ph.baseColor === 'cream') ? 'Cream' : 'Red';
  else color = ({ black:'Black', blue:'Blue', chocolate:'Chocolate', lilac:'Lilac' }[ph.baseColor]) || 'Black';
  const pattern = ph.pattern === 'solid' ? 'Solid' : ({ Mc:'Mackerel', Cs:'Classic', Sp:'Spotted', Tk:'Ticked' }[ph.pattern] || 'Solid');
  // Named white pattern (capitalize the phenotype's whitePattern)
  const wpName = { solid:'Solid', locket:'Locket', mitted:'Mitted', tuxedo:'Tuxedo', bicolor:'Bicolor', van:'Van' };
  const white = wpName[ph.whitePattern] || 'Solid';
  const fur = genes.L.every(a => a === 'l') ? 'Long' : 'Short';
  const point = (genes.C && genes.C.every(a => a === 'cs')) ? 'Colorpoint' : 'No';
  let eyes = 'Auto';
  if (genes.eyeOverride) { for (const k in EYE_HEX) if (EYE_HEX[k] === genes.eyeOverride) eyes = k; }
  return { color, pattern, white, fur, point, eyes };
}

// Write a look object into the visible alleles of `genes` (in place).
function applyLookToGenes(look, genes, sex) {
  // Color
  if (look.color === 'White') {
    genes.W = ['W','w'];
  } else {
    genes.W = ['w','w'];
    const setO = (mode) => { genes.O = sex === 'M' ? [mode==='on'?'O':'o'] : (mode==='tortie' ? ['O','o'] : [mode==='on'?'O':'o', mode==='on'?'O':'o']); };
    switch (look.color) {
      case 'Black':     genes.B=['B','B']; genes.D=['D','D']; setO('off'); break;
      case 'Blue':      genes.B=['B','B']; genes.D=['d','d']; setO('off'); break;
      case 'Chocolate': genes.B=['b','b']; genes.D=['D','D']; setO('off'); break;
      case 'Lilac':     genes.B=['b','b']; genes.D=['d','d']; setO('off'); break;
      case 'Red':       genes.D=['D','D']; setO('on'); break;
      case 'Cream':     genes.D=['d','d']; setO('on'); break;
      case 'Tortie':    genes.D=['D','D']; setO(sex==='M' ? 'on' : 'tortie'); break;  // males can't be tortie → red
    }
  }
  // Pattern
  if (look.pattern === 'Solid') { genes.A = ['a','a']; }
  else { genes.A = ['A','A']; const t = { Mackerel:'Mc', Classic:'Cs', Spotted:'Sp', Ticked:'Tk' }[look.pattern]; genes.T = [t, t]; }
  // White: store the explicit named pattern (genes.whitePattern overrides the
  // S-count derivation in calculatePhenotype) and set S to a matching amount so
  // any S-based logic stays sane.
  const wpLower = (look.white || 'Solid').toLowerCase();
  if (wpLower === 'solid') { genes.whitePattern = 'solid'; genes.S = ['s','s']; }  // pin Solid (authoritative)
  else {
    genes.whitePattern = wpLower;
    genes.S = (wpLower === 'bicolor' || wpLower === 'van') ? ['S','S']
            : (wpLower === 'locket') ? ['s','s'] : ['S','s'];
  }
  // Fur
  genes.L = look.fur === 'Long' ? ['l','l'] : ['L','L'];
  // Point
  genes.C = look.point === 'Colorpoint' ? ['cs','cs'] : ['C','C'];
  // Eyes (override or genetic default)
  if (look.eyes === 'Auto') delete genes.eyeOverride;
  else genes.eyeOverride = EYE_HEX[look.eyes];
}

// Redraw just the founder preview cat + tags (no full card rebuild) — used when a
// pill is tapped, so the open expander doesn't collapse.
function refreshStarterVisual(key, cat) {
  const ph = calculatePhenotype(cat.genes, cat.sex);
  const canvasEl = document.querySelector(`canvas[data-preview="${key}"]`);
  if (canvasEl) {
    const ctx = canvasEl.getContext('2d');
    ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
    const fake = { ...cat, phenotype: ph, age: 60, stage: 'adult', state: 'wander', bornFlash: 0, id: key === 'A' ? 1 : 2 };
    drawCat(ctx, fake, canvasEl.width / 2, canvasEl.height / 2 + 10, 2.2, 0);
  }
  const tagWrap = document.querySelector(`[data-tags="${key}"]`);
  if (tagWrap) {
    tagWrap.innerHTML = '';
    for (const t of genesToTags(cat.genes, cat.sex, ph)) {
      const span = document.createElement('span'); span.className = 'tag'; span.textContent = t; tagWrap.appendChild(span);
    }
  }
}

// Tappable segmented pill rows — tap the option you want (no arrows, no desync).
function buildAppearancePicker(key, cat) {
  const wrap = document.querySelector(`[data-appearance="${key}"]`);
  if (!wrap) return;
  if (!cat.look) cat.look = genesToLook(cat.genes, cat.sex);
  wrap.innerHTML = '';
  // Cross-trait masking: dominant White masks pattern/white/point; Colorpoint
  // forces solid + no white. Greyed rows show WHY rather than lying with a lit pill.
  const isWhite = cat.look.color === 'White';
  const isPoint = cat.look.point === 'Colorpoint';
  const maskedRows = {
    pattern: isWhite ? 'white coat hides pattern' : isPoint ? 'colorpoint is solid' : null,
    white:   isWhite ? 'already all white' : isPoint ? 'colorpoint has no white' : null,
    point:   isWhite ? 'white coat hides points' : null,
  };
  for (const tr of LOOK_TRAITS) {
    // Tortie is female-only — hide it for males so every shown option is valid.
    const opts = tr.options.filter(o => !(o === 'Tortie' && cat.sex === 'M'));
    const masked = maskedRows[tr.key];
    const row = document.createElement('div');
    row.className = 'look-row' + (masked ? ' masked' : '');
    const lbl = document.createElement('div');
    lbl.className = 'look-label';
    lbl.textContent = masked ? `${tr.label} — ${masked}` : tr.label;
    const seg = document.createElement('div');
    seg.className = 'look-seg';
    for (const opt of opts) {
      const pill = document.createElement('button');
      pill.className = 'look-pill' + (cat.look[tr.key] === opt ? ' active' : '');
      pill.textContent = opt;
      if (masked) pill.disabled = true;
      // Eye pills get a color dot
      if (tr.key === 'eyes' && EYE_HEX[opt]) {
        const dot = document.createElement('span'); dot.className = 'eye-dot'; dot.style.background = EYE_HEX[opt];
        pill.prepend(dot);
      }
      pill.addEventListener('click', () => {
        cat.look[tr.key] = opt;
        applyLookToGenes(cat.look, cat.genes, cat.sex);
        refreshStarterVisual(key, cat);
        // Color/Point toggle which rows are masked → rebuild so greying updates.
        if (tr.key === 'color' || tr.key === 'point') buildAppearancePicker(key, cat);
        else seg.querySelectorAll('.look-pill').forEach(p => p.classList.toggle('active', p === pill));
      });
      seg.appendChild(pill);
    }
    row.appendChild(lbl);
    row.appendChild(seg);
    wrap.appendChild(row);
  }
}

document.addEventListener('click', (e) => {
  const reroll = e.target.closest('[data-reroll]');
  if (reroll) {
    const k = reroll.dataset.reroll;
    state.starter[k] = { sex: k==='A'?'M':'F', genes: rollGenes(k==='A'?'M':'F'), name: pick(NAME_POOL) };
    refreshCard(k);
    return;
  }
  const rerollLook = e.target.closest('[data-reroll-look]');
  if (rerollLook) {
    const k = rerollLook.dataset.rerollLook;
    const cur = state.starter[k];
    const sex = cur.sex;
    const newg = rollGenes(sex);
    // keep behavioral, replace visible
    for (const v of ['B','D','A','T','S','L','W','C','O']) cur.genes[v] = newg[v];
    delete cur.genes.eyeOverride;
    delete cur.genes.whitePattern;   // let the new roll derive its own white pattern
    cur.look = null;   // re-derive pills from the new look
    refreshCard(k);
    return;
  }
  // Random traits — re-roll ONLY behavioral genes, keep the appearance/look.
  const rerollTraits = e.target.closest('[data-reroll-traits]');
  if (rerollTraits) {
    const k = rerollTraits.dataset.rerollTraits;
    const cur = state.starter[k];
    const newg = rollGenes(cur.sex);
    for (const t of ['boldness','sociability','playfulness','aggression','energy','appetite','size']) cur.genes[t] = newg[t];
    refreshCard(k);
    return;
  }
  // Save the current founder as a named preset (full cat: look + personality + name).
  const saveP = e.target.closest('[data-save-preset]');
  if (saveP) {
    const k = saveP.dataset.savePreset;
    const cur = state.starter[k];
    const nm = (cur.name || 'My cat').slice(0, 24);
    savePreset(nm, { sex: cur.sex, genes: cur.genes, name: cur.name });
    const list = document.querySelector(`[data-presets="${k}"]`);
    list.hidden = false;
    renderPresetList(k);
    return;
  }
  // Toggle the saved-cats list for this slot.
  const openP = e.target.closest('[data-open-presets]');
  if (openP) {
    const k = openP.dataset.openPresets;
    const list = document.querySelector(`[data-presets="${k}"]`);
    list.hidden = !list.hidden;
    if (!list.hidden) renderPresetList(k);
    return;
  }
  // Load a preset into this slot.
  const loadP = e.target.closest('[data-load-preset]');
  if (loadP) {
    const k = loadP.dataset.slot;
    const idx = +loadP.dataset.loadPreset;
    const presets = getPresets();
    const p = presets[idx];
    if (p) {
      const slotSex = state.starter[k].sex;   // keep the slot's sex (A=male, B=female)
      const genes = { ...p.genes };
      // Fix X-linked O allele count if the preset's sex differs from the slot.
      // males can't be tortie → show the red side deterministically (not a coin-flip)
      if (slotSex === 'M' && genes.O && genes.O.length === 2) genes.O = [genes.O.includes('O') ? 'O' : 'o'];
      else if (slotSex === 'F' && genes.O && genes.O.length === 1) genes.O = [genes.O[0], genes.O[0]];
      state.starter[k] = { sex: slotSex, genes, name: p.name, look: null };
      refreshCard(k);
    }
    return;
  }
  // Delete a preset.
  const delP = e.target.closest('[data-del-preset]');
  if (delP) {
    e.stopPropagation();
    const k = delP.dataset.slot;
    const idx = +delP.dataset.delPreset;
    const presets = getPresets();
    presets.splice(idx, 1);
    localStorage.setItem('colony_presets', JSON.stringify(presets));
    renderPresetList(k);
    return;
  }
  const expBtn = e.target.closest('.expander-toggle');
  if (expBtn) {
    expBtn.parentElement.classList.toggle('open');
    return;
  }
  if (e.target.id === 'rollBoth') {
    state.starter.A = { sex:'M', genes: rollGenes('M'), name: pick(NAME_POOL) };
    state.starter.B = { sex:'F', genes: rollGenes('F'), name: pick(NAME_POOL) };
    refreshCard('A'); refreshCard('B');
    return;
  }
  if (e.target.id === 'beginBtn') {
    beginSim();
    return;
  }
});
document.addEventListener('input', (e) => {
  if (e.target.dataset.name) {
    state.starter[e.target.dataset.name].name = e.target.value;
  }
});

// ─── BEGIN SIM ────────────────────────────────────────────────
let canvas, ctx;
function beginSim() {
  // hide setup, show game
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').classList.add('active');
  state.phase = 'running';
  state.cats = [];
  state.food = [];
  state.feedSpots = [];
  state.simTime = 0;
  state.lastTime = 0;
  state.events = [];
  state.history = [];
  state.diversityHistory = [];
  state.geneHistory = { boldness:[], sociability:[], playfulness:[], aggression:[], energy:[], appetite:[], bodyScale:[] };
  state.season = 'spring';
  state.year = 1;
  state.diseaseOutbreaks = 0;
  state.activeEvent = null;
  state.activeEventMessage = '';
  state.eventLog = [];
  state.eventTimeline = [];
  state._eventEntry = null;
  state.climate = makeStartingWeather();
  state.deceased = [];
  state.deathCauses = {};
  state.eventExposure = {};
  state.lifespanSum = 0; state.lifespanCount = 0;
  state.records = { oldest: null, mostProlific: null, mostFights: null, mostInbred: null, biggest: null };
  // Carrying capacity → colonies stabilize around ~100 cats (soft cap). Drift
  // stays visible at this size via the founder-relative trait tint (the whole
  // field shifts color as the colony evolves) rather than needing a tiny pop.
  state.colonyScale = 0.7;

  // resize canvas (sets sim.arenaW/H before founders are placed)
  canvas = document.getElementById('arena');
  resize();

  // Founder pair + feeding spots + initial food — all in the sim now, so the
  // bench harness starts colonies identically. Genes come from the setup screen.
  sim.seedFounders({
    aGenes: state.starter.A.genes, aName: state.starter.A.name,
    bGenes: state.starter.B.genes, bName: state.starter.B.name,
  });
}

// We use a virtual canvas size in logical pixels.
// arenaW / arenaH live on the Simulation now (sim.arenaW, sim.arenaH) so the
// bench harness has a world size without a window. These let bindings shadow
// the sim values so existing call sites keep reading bare arenaW/arenaH.
let arenaW = sim.arenaW, arenaH = sim.arenaH;
function resize() {
  canvas = document.getElementById('arena');
  const dpr = window.devicePixelRatio || 1;
  arenaW = window.innerWidth;
  arenaH = window.innerHeight;
  sim.arenaW = arenaW;
  sim.arenaH = arenaH;
  canvas.width = arenaW * dpr;
  canvas.height = arenaH * dpr;
  canvas.style.width = arenaW + 'px';
  canvas.style.height = arenaH + 'px';
  const ctx2 = canvas.getContext('2d');
  ctx2.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Shadow logical dims onto canvas object for any old refs:
  canvas._w = arenaW;
  canvas._h = arenaH;
}

window.addEventListener('resize', () => {
  if (state.phase !== 'setup') resize();
});

// arena tap
window.addEventListener('DOMContentLoaded', () => {
  const arena = document.getElementById('arena');
  arena.addEventListener('click', onArenaTap);

  // speed controls
  document.getElementById('speedControls').addEventListener('click', (e) => {
    const btn = e.target.closest('.speed-btn');
    if (!btn) return;
    const sp = parseInt(btn.dataset.speed);
    state.speed = sp;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b===btn));
  });

  // Evolution tracker toggle
  document.getElementById('evoToggle').addEventListener('click', () => {
    const tr = document.getElementById('evoTracker');
    tr.classList.toggle('hidden');
    if (!tr.classList.contains('hidden')) renderEvoTracker();
  });

  // End run button → confirmation modal
  document.getElementById('endRunBtn').addEventListener('click', () => {
    if (state.phase !== 'running') return;
    document.getElementById('confirmModal').classList.remove('hidden');
  });
  document.getElementById('confirmCancel').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
  });
  document.getElementById('confirmEnd').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
    state.endedByUser = true;
    // Snapshot all surviving cats into deceased so the end screen has full data
    for (const c of state.cats) {
      if (!c.dying) {
        // Use synthetic death — adds them to deceased without playing the fade
        const snap = {
          id: c.id, name: c.name, sex: c.sex, age: c.age, bornAt: c.bornAt,
          diedAt: state.simTime, diedOf: 'survived',
          children: c.children.length, childrenIds: [...c.children],
          parents: c.parents ? [...c.parents] : null,
          fightCount: c.fightCount || 0,
          inbreedF: c.inbreedF || 0, bodyScale: c.bodyScale || 1,
          phenotype: c.phenotype, genes: c.genes, gen: c._gen || 1,
          wasFounder: state.founders.includes(c.id),
        };
        // Update all-time records with survivors
        const r = state.records;
        if (!r.oldest      || snap.age        > r.oldest.age)            r.oldest = snap;
        if (!r.mostProlific|| snap.children   > r.mostProlific.children) r.mostProlific = snap;
        if (!r.mostFights  || snap.fightCount > r.mostFights.fightCount) r.mostFights = snap;
        if (!r.mostInbred  || snap.inbreedF   > r.mostInbred.inbreedF)   r.mostInbred = snap;
        if (!r.biggest     || snap.bodyScale  > r.biggest.bodyScale)     r.biggest = snap;
        state.deceased.push(snap);
        if (state.deceased.length > 400) state.deceased.shift();
      }
    }
    endSimulation();
  });

  initSetup();
  requestAnimationFrame(tick);
});

window.restart = restart;

</script>
